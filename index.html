  .station-head-icon{width:42px;height:42px;flex-shrink:0;border-radius:12px;background:rgba(45,212,191,.16);color:#5eead4;display:flex;align-items:center;justify-content:center;}
  .station-head-icon svg{width:21px;height:21px;}
  .station-head-name{margin:0;font-size:19px;color:var(--txt);font-weight:700;}
  .station-head-sub{margin:2px 0 0;font-size:12.5px;color:var(--dim);font-family:var(--mono);}
  .station-head-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .recent-panel .panel-h{margin-bottom:10px;}
  .recent-list{display:flex;flex-direction:column;gap:6px;}
  .recent-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer;font-family:var(--sans);}
  .recent-item:hover{border-color:var(--accent);}
  .recent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .recent-title{flex:1;min-width:0;color:var(--txt);font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .recent-sys{font-size:11px;color:var(--dim);font-family:var(--mono);flex-shrink:0;}
  .hbtn-trash{position:relative;}
  .hbtn-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;font-family:var(--sans);display:flex;align-items:center;justify-content:center;}
  .trash-empty{text-align:center;color:var(--dim);padding:24px 0;}
  .trash-empty svg{width:34px;height:34px;opacity:.5;}
  .trash-empty p{margin:8px 0 0;font-size:13px;}
  .trash-list{display:flex;flex-direction:column;gap:8px;}
  .trash-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--inset);border:1px solid var(--line);border-radius:11px;}
  .trash-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .trash-info{flex:1;min-width:0;display:flex;flex-direction:column;}
  .trash-title{font-size:13.5px;color:var(--txt);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .trash-meta{font-size:11px;color:var(--dim);font-family:var(--mono);}
  .trash-confirm{font-size:12px;color:var(--dim);}
  .trash-btn{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;background:var(--panel);border:1px solid var(--line-strong);color:var(--txt2);border-radius:8px;padding:7px 11px;font-size:12px;font-family:var(--sans);cursor:pointer;}
  .trash-btn.restore:hover{border-color:var(--accent);color:var(--accent);}
  .trash-btn.danger{color:var(--danger);border-color:rgba(248,113,113,.35);}
  .trash-btn.danger:hover{background:rgba(248,113,113,.1);}
  .trash-btn svg{width:14px;height:14px;}
  .stationmap-panel{padding:0;overflow:hidden;}
  .stationmap{height:240px;width:100%;background:var(--code);position:relative;z-index:0;}
  .stationmap-foot{display:flex;gap:8px;flex-wrap:wrap;padding:12px;border-top:1px solid var(--line);}
  .stationmap-foot a.foot-mini{text-decoration:none;}
  .stationset .stationset-row{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  .stationset-input{flex:1;min-width:0;}
  .leaflet-container{font-family:var(--sans);}
  .allstationsmap{height:300px;}
  .stationmap-panel .panel-h{display:flex;align-items:center;}
  .bk-section{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}
  .bk-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--txt);margin-bottom:8px;}
  .bk-head svg{width:17px;height:17px;color:var(--accent);}
  .bk-list{display:flex;flex-direction:column;gap:8px;}
  .bk-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--inset);border:1px solid var(--line);border-radius:10px;flex-wrap:wrap;}
  .bk-info{flex:1;min-width:90px;display:flex;flex-direction:column;}
  .bk-date{font-size:13px;color:var(--txt);font-weight:600;font-family:var(--mono);}
  .bk-count{font-size:11px;color:var(--dim);font-family:var(--mono);}
  .modal-body{padding:20px;display:flex;flex-direction:column;gap:16px;}
  .x{background:none;border:none;color:var(--dim);cursor:pointer;transition:color .15s;}
  .x:hover{color:var(--txt);}
  label.field{display:block;}
  label.field .lbl{font-size:12px;color:var(--dim);margin-bottom:7px;display:block;letter-spacing:.01em;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:560px){.row2{grid-template-columns:1fr;}}
  .toggle-row{display:flex;gap:8px;flex-wrap:wrap;}
  .toggle{flex:1;padding:9px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;background:var(--inset);border:1px solid var(--line);color:var(--dim);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
  .toggle.active{background:var(--accent-soft);border-color:rgba(245,165,36,.5);color:var(--accent);}
  textarea{resize:vertical;}
  .foot-btn{flex:1;padding:12px;border-radius:11px;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s;}
  .foot-btn:active{transform:scale(.98);}
  .foot-cancel{background:var(--line2);color:var(--txt2);}
  .foot-save{background:linear-gradient(180deg,#f7b73a,#f59e0b);color:#1a1206;font-weight:600;}
  .foot-save:disabled{opacity:.4;cursor:not-allowed;}
  .banner{margin:16px 0;padding:14px 16px;border-radius:12px;font-size:13px;line-height:1.5;}
  .banner.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:#fca5a5;}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:11px;font-size:13px;background:rgba(22,28,38,.95);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid rgba(52,211,153,.4);color:#6ee7b7;font-family:var(--mono);z-index:60;box-shadow:0 12px 30px -10px rgba(0,0,0,.6);animation:popIn .25s ease both;}
  .spin{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:none;}}
  @keyframes popIn{from{opacity:0;transform:translateY(10px) scale(.985);}to{opacity:1;transform:none;}}
  /* Login */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;}
  .login-card{position:relative;width:100%;max-width:392px;background:var(--surface);border:1px solid var(--line-strong);border-radius:22px;padding:36px 30px;box-shadow:0 40px 90px -40px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.02);overflow:hidden;animation:popIn .4s ease both;}
  .login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.8;}
  .login-card::after{content:"";position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:280px;height:280px;background:radial-gradient(circle,rgba(245,165,36,.12),transparent 65%);pointer-events:none;}
  .login-logo{position:relative;width:52px;height:52px;border-radius:14px;background:linear-gradient(140deg,#1b2330,#10151d);border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;color:var(--accent);margin-bottom:22px;box-shadow:0 12px 28px -10px rgba(245,165,36,.45);}
  .login-card h1{font-family:var(--mono);font-size:23px;margin:0 0 5px;font-weight:600;letter-spacing:-.01em;}
  .login-card p{color:var(--dim);font-size:13px;margin:0 0 26px;line-height:1.5;}
  .login-card label{display:block;margin-bottom:15px;}
  .login-card .lbl{font-size:12px;color:var(--muted);margin-bottom:7px;display:block;}
  /* System tabs */
  .systabs{display:flex;gap:7px;overflow-x:auto;margin:2px 0 14px;padding-bottom:2px;}
  .systabs::-webkit-scrollbar{display:none;}
  .systab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-family:var(--mono);font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .systab:hover{border-color:var(--line-strong);color:var(--txt2);}
  .systab.active{color:var(--txt);border-color:var(--sys,var(--accent));background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);box-shadow:0 0 0 1px var(--sys,var(--accent)),0 8px 22px -12px var(--sys,var(--accent));}
  .sysdot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor;}
  .syscnt{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(255,255,255,.06);color:var(--muted);}
  .systab.active .syscnt{background:var(--accent-soft);color:var(--txt);}
  /* Scope filter pills */
  .scoperow{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 12px;}
  .scopebtn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-family:var(--sans);font-size:12.5px;cursor:pointer;transition:background .15s,color .15s,border-color .15s;}
  .scopebtn svg{width:13px;height:13px;}
  .scopebtn:hover{color:var(--txt);border-color:var(--line-strong);}
  .scopebtn.active{background:var(--accent-soft);color:var(--accent);border-color:rgba(245,165,36,.4);}
  /* Sub bar (count + sort) */
  .subbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:2px 0 14px;}
  .resultcnt{font-size:12px;color:var(--dim);font-family:var(--mono);}
  .sortwrap{display:flex;align-items:center;gap:6px;color:var(--dim);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 6px 0 10px;}
  .sortsel{width:auto;background:transparent;border:none;padding:7px 4px;font-size:12px;color:var(--muted);font-family:var(--mono);}
  .sortsel:focus{box-shadow:none;}
  /* System tag on card */
  .systag{font-size:9.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-family:var(--mono);padding:2px 7px;border-radius:6px;border:1px solid;background:rgba(255,255,255,.02);}
  /* Star button active */
  .ibtn.on{color:var(--accent);border-color:rgba(245,165,36,.4);background:var(--accent-soft);}
  .card.pinned{border-color:rgba(245,165,36,.28);}
  /* Tag buttons */
  .tag{background:none;border:none;padding:0;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--muted);opacity:.85;transition:color .15s;}
  .tag:hover{color:var(--accent);opacity:1;}
  /* User panel */
  .useryou{display:flex;align-items:center;gap:11px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--inset);color:var(--accent);}
  .udivider{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);border-top:1px solid var(--line);padding-top:16px;margin-top:2px;}
  /* App shell */
  .app{display:flex;min-height:100vh;}
  .main{flex:1;min-width:0;max-width:1080px;margin:0 auto;padding:26px 26px 120px;width:100%;}
  .nav{position:fixed;top:0;left:0;bottom:0;width:248px;background:var(--panel2);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:20px 14px;z-index:30;}
  .nav-brand{display:flex;align-items:center;gap:12px;padding:6px 8px 16px;margin-bottom:8px;border-bottom:1px solid var(--line);}
  .nav-brandtxt .nav-title{font-family:var(--mono);font-size:17px;font-weight:600;}
  .nav-brandtxt .nav-sub{font-size:11px;color:var(--dim);}
  .nav-items{display:flex;flex-direction:column;gap:4px;}
  .nav-item{position:relative;display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;border:1px solid transparent;background:none;color:var(--muted);cursor:pointer;font-size:13.5px;font-family:var(--sans);text-align:left;transition:background .15s,color .15s;}
  .nav-item:hover{background:var(--panel);color:var(--txt);}
  .nav-item.active{background:var(--accent-soft);color:var(--txt);border-color:rgba(245,165,36,.28);}
  .nav-item.active::before{content:"";position:absolute;left:-1px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--accent);}
  .nav-ic{display:flex;color:var(--dim);}
  .nav-item.active .nav-ic,.nav-item:hover .nav-ic{color:inherit;}
  .nav-item.active .nav-ic{color:var(--accent);}
  .nav-lbl{flex:1;}
  .nav-lbl-s{display:none;}
  .nav-cnt{font-size:11px;color:var(--dim);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:9px;font-family:var(--mono);}
  .nav-item.active .nav-cnt{background:var(--accent-soft);color:var(--accent);}
  .nav-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);}
  .nav-user{display:flex;align-items:center;gap:10px;padding:6px 8px;color:var(--muted);font-size:12px;}
  .nav-email{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-footbtns{display:flex;gap:6px;margin-top:8px;}
  @media(min-width:861px){.main{margin-left:248px;}.fab{display:none;}}
  @media(max-width:860px){
    .nav{top:auto;width:100%;height:calc(64px + env(safe-area-inset-bottom));flex-direction:row;border-right:none;border-top:1px solid var(--line);padding:0 0 env(safe-area-inset-bottom);background:var(--panel2);}
    .nav-brand,.nav-foot{display:none;}
    .nav-items{flex-direction:row;flex:1;gap:0;}
    .nav-item{flex:1;flex-direction:column;gap:3px;padding:9px 1px 8px;border-radius:0;font-size:9.5px;justify-content:center;border:none;min-width:0;}
    .nav-item.active{background:none;color:var(--accent);}
    .nav-item.active::before{left:50%;top:0;transform:translateX(-50%);width:26px;height:3px;border-radius:0 0 3px 3px;}
    .nav-users{display:none;}
    .nav-lbl{display:none;}
    .nav-lbl-s{display:block;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
    .nav-cnt{display:none;}
    .nav-ic svg{width:22px;height:22px;}
    .main{padding:calc(14px + env(safe-area-inset-top)) 15px calc(92px + env(safe-area-inset-bottom));}
    .page-title{font-size:20px;}
    .topbar-email{max-width:40vw;}
  }
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px;}
  .page-title{font-family:var(--mono);font-size:24px;font-weight:600;margin:0;letter-spacing:-.02em;}
  .page-sub{font-size:13px;color:var(--dim);margin:4px 0 0;}
  .addbtn{flex-shrink:0;}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  @media(max-width:640px){.tiles{grid-template-columns:repeat(2,1fr);}}
  .tile{position:relative;text-align:left;display:flex;flex-direction:column;gap:7px;padding:16px;border-radius:16px;border:1px solid var(--line);background:var(--surface);cursor:pointer;overflow:hidden;transition:transform .15s,border-color .15s,box-shadow .15s;}
  .tile::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:var(--c);opacity:.55;}
  .tile:hover{transform:translateY(-2px);border-color:var(--line-strong);box-shadow:0 16px 32px -20px rgba(0,0,0,.6);}
  .tile-ic{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:11px;background:color-mix(in srgb,var(--c) 15%,transparent);margin-bottom:1px;}
  .tile-val{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1;}
  .tile-lbl{font-size:12px;color:var(--dim);}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:0;}
  @media(max-width:760px){.dash-grid{grid-template-columns:1fr;}}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:16px;margin-bottom:14px;}
  .panel-h{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .panel-h svg{color:var(--dim);}
  .bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer;}
  .bar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor;}
  .bar-label{width:64px;font-size:13px;color:var(--txt2);}
  .bar-track{flex:1;height:8px;border-radius:5px;background:rgba(255,255,255,.05);overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;transition:width .5s ease;}
  .bar-num{font-family:var(--mono);font-size:13px;color:var(--muted);width:28px;text-align:right;}
  .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .topic-card{display:flex;align-items:center;gap:9px;padding:11px;border-radius:11px;border:1px solid var(--line);background:var(--inset);cursor:pointer;transition:all .15s;}
  .topic-card:hover{border-color:var(--cat);transform:translateY(-1px);}
  .topic-ic{display:flex;}
  .topic-name{flex:1;font-size:13px;color:var(--txt2);}
  .topic-cnt{font-family:var(--mono);font-size:12px;color:var(--dim);}
  .minirow{display:flex;align-items:center;gap:11px;width:100%;padding:9px 6px;border:none;border-bottom:1px solid var(--line);background:none;cursor:pointer;text-align:left;}
  .minirow:last-child{border-bottom:none;}
  .minirow:hover .mini-title{color:var(--txt);}
  .mini-ic{display:flex;flex-shrink:0;}
  .mini-title{flex:1;font-size:13px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mini-pin{display:flex;}
  .mini-badge{font-size:9.5px;padding:2px 7px;border-radius:6px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
  .cards{display:grid;grid-template-columns:1fr;gap:14px;align-items:start;}
  .cards .card{margin-bottom:0;min-width:0;}
  @media(min-width:900px){.cards{grid-template-columns:repeat(2,1fr);}}
  .typechip{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:6px;border:1px solid;}
  .typechip.is-code{color:#a78bfa;border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.1);}
  .typechip.is-note{color:#60a5fa;border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.1);}
  .typechip svg{width:11px;height:11px;}
  /* Top action bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;}
  .topbar-user{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;min-width:0;}
  .topbar-user svg{color:var(--accent);flex-shrink:0;}
  .topbar-email{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55vw;}
  .topbar-actions{display:flex;gap:8px;flex-shrink:0;}
  @media(min-width:861px){.topbar-user{display:none;}}
  /* Code highlighting */
  pre.code .hljs,pre.code code.hljs{background:transparent;padding:0;color:#cbd5e1;}
  .code-copy{margin-left:auto;display:inline-flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:10.5px;cursor:pointer;padding:4px 9px;border-radius:8px;transition:color .15s,border-color .15s,background .15s;}
  .code-copy:hover{color:var(--accent);border-color:rgba(245,165,36,.4);background:var(--accent-soft);}
  .code-copy svg{width:12px;height:12px;}
  /* Card title button + foot */
  button.card-title{background:none;border:none;padding:0;text-align:left;cursor:pointer;font-weight:600;font-size:14.5px;color:var(--txt);line-height:1.35;font-family:var(--sans);transition:color .15s;}
  button.card-title:hover{color:var(--accent);}
  .card-foot{display:flex;align-items:center;gap:6px;padding:0 16px 12px 18px;color:var(--dim);font-size:11px;font-family:var(--mono);}
  .card-foot svg{width:12px;height:12px;}
  /* Detail modal */
  .modal.detail{max-width:680px;}
  .crumbs{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;color:var(--dim);}
  .detail-title{font-size:22px;margin:2px 0 0;font-weight:600;line-height:1.25;letter-spacing:-.01em;}
  .detail-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:-2px 0 2px;}
  .detail-date{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);font-family:var(--mono);}
  .detail-date svg{width:12px;height:12px;}
  .related{border-top:1px solid var(--line);padding-top:14px;margin-top:6px;}
  .related-h{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .related-h svg{color:var(--dim);width:14px;height:14px;}
  .detail .code-wrap{margin:0;}
  /* Dashboard welcome + quick add */
  .welcome{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
  .quickadd{display:flex;gap:8px;}
  .qbtn{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--txt);font-size:13px;font-family:var(--sans);cursor:pointer;transition:transform .15s,border-color .15s;}
  .qbtn:hover{transform:translateY(-1px);border-color:var(--line-strong);}
  .qbtn svg{width:16px;height:16px;}
  /* Tag cloud */
  .tagcloud{display:flex;flex-wrap:wrap;gap:7px;}
  .cloudtag{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:9px;border:1px solid var(--line);background:var(--inset);color:var(--muted);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s;}
  .cloudtag:hover{color:var(--accent);border-color:rgba(245,165,36,.4);}
  .cloudcnt{font-size:10px;color:var(--dim);background:rgba(255,255,255,.05);padding:0 6px;border-radius:7px;}
  .nav-item.active{box-shadow:0 0 18px -10px var(--accent);}
  .actchart{display:flex;align-items:flex-end;gap:3px;height:70px;}
  .actbar{flex:1;display:flex;align-items:flex-end;height:100%;}
  .actbar-fill{width:100%;background:linear-gradient(180deg,var(--accent),rgba(245,165,36,.35));border-radius:3px;min-height:3px;}
  .actcnt{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim);}
  .actaxis{display:flex;justify-content:space-between;margin-top:8px;font-size:10px;color:var(--dim);font-family:var(--mono);}
  @media(max-width:560px){.quickadd{width:100%;}.qbtn{flex:1;justify-content:center;}}
  /* Theme toggle on login */
  .login-theme{position:absolute;top:18px;right:18px;}
  /* Split code + description */
  .splitfields{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:680px){.splitfields{grid-template-columns:1fr;}}
  .lbl-opt{color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;}
  .lbl svg{width:13px;height:13px;vertical-align:-2px;margin-right:4px;opacity:.7;}
  /* Description above code */
  .note.desc{margin:2px 16px 10px 18px;padding:1px 0 1px 12px;border-left:2px solid var(--accent);color:var(--muted);font-size:13px;line-height:1.6;}
  /* Breadcrumbs */
  .page-crumbs{margin-bottom:9px;}
  /* Bigger icons + depth */
  .nav-ic svg{width:19px;height:19px;}
  .tile-ic svg{width:20px;height:20px;}
  .panel-h svg{width:15px;height:15px;}
  .card{box-shadow:0 2px 10px rgba(0,0,0,.16);}
  body.light .card,body.light .tile,body.light .panel{box-shadow:0 2px 14px rgba(15,23,42,.06);}
  body.light .login-card{box-shadow:0 30px 70px -30px rgba(15,23,42,.25);}
  body.light .grid-bg{opacity:.04;background-image:linear-gradient(rgba(15,23,42,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(15,23,42,.6) 1px,transparent 1px);}
  /* Signup link + approval list */
  .link-btn{display:block;width:100%;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--sans);transition:color .15s;}
  .link-btn:hover{color:var(--accent);}
  .seg{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:4px;}
  .segbtn{flex:1;padding:8px 10px;border:none;background:none;border-radius:8px;color:var(--muted);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;}
  .segbtn.active{background:var(--accent-soft);color:var(--accent);}
  .urow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .urow-mail{font-size:13px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px;}
  .urow-status{font-size:11px;font-family:var(--mono);margin-top:2px;}
  .urow-status.ok{color:var(--ok);}
  .urow-status.wait{color:var(--accent);}
  .utag.admin{font-size:9px;text-transform:uppercase;letter-spacing:.05em;padding:1px 6px;border-radius:6px;background:var(--accent-soft);color:var(--accent);font-family:var(--mono);}
  .ubtn-approve{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:#1a1205;border:none;border-radius:9px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);}
  .ubtn-approve svg{width:13px;height:13px;}
  .ubtn-revoke{flex-shrink:0;background:none;border:1px solid var(--line-strong);color:var(--muted);border-radius:9px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);}
  /* Images */
  .imgsection{margin-top:6px;}
  .imggrid{display:flex;flex-wrap:wrap;gap:8px;}
  .imgitem{position:relative;width:84px;height:84px;border-radius:10px;overflow:hidden;border:1px solid var(--line);}
  .imgitem img{width:100%;height:100%;object-fit:cover;display:block;}
  .imgdel{position:absolute;top:3px;right:3px;width:22px;height:22px;border:none;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .imgdel svg{width:13px;height:13px;}
  .imgadd{width:84px;height:84px;border-radius:10px;border:1px dashed var(--line-strong);background:var(--inset);color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-size:11px;font-family:var(--sans);}
  .imgadd:hover{border-color:var(--accent);color:var(--accent);}
  .imgadd svg{width:18px;height:18px;}
  .imgadd:disabled{opacity:.6;cursor:default;}
  .imgstrip{display:flex;gap:8px;padding:10px 16px 0 18px;flex-wrap:wrap;}
  .imgthumb{position:relative;width:64px;height:64px;border-radius:9px;overflow:hidden;border:1px solid var(--line);display:block;}
  .imgthumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .imgmore{position:absolute;inset:0;background:rgba(0,0,0,.55);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;}
  .detail-imgs{display:flex;flex-direction:column;gap:10px;margin:6px 0;}
  .detail-imgs img{width:100%;border-radius:12px;border:1px solid var(--line);display:block;}
  /* Version history */
  .histbox{border-top:1px solid var(--line);padding-top:14px;margin-top:6px;}
  .hist-empty{color:var(--dim);font-size:13px;line-height:1.5;}
  .histrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .histrow:last-child{border-bottom:none;}
  .hist-when{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:12px;color:var(--txt2);}
  .hist-when svg{width:12px;height:12px;color:var(--dim);}
  .hist-snip{font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
  .hist-restore{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:9px;border:1px solid var(--line-strong);background:var(--inset);color:var(--txt2);font-size:12px;font-family:var(--sans);cursor:pointer;}
  .hist-restore:hover{border-color:var(--accent);color:var(--accent);}
  .hist-restore:disabled{opacity:.5;cursor:default;}
  .foot-ghost{background:var(--inset);border:1px solid var(--line-strong);color:var(--txt2);}
  .foot-ghost:hover{border-color:var(--accent);color:var(--accent);}
  /* Offline badge */
  .offline-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:9px;font-size:11px;font-family:var(--mono);background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.4);color:#fca5a5;}
  .offline-dot{width:7px;height:7px;border-radius:50%;background:#f87171;}
  /* Active tag filters */
  .activetags{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
  .activetags-lbl{font-size:12px;color:var(--dim);font-family:var(--mono);}
  .atag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:9px;border:1px solid rgba(245,165,36,.4);background:var(--accent-soft);color:var(--accent);font-family:var(--mono);font-size:12px;cursor:pointer;}
  .atag svg{width:12px;height:12px;}
  .atag-clear{padding:5px 10px;border-radius:9px;border:1px solid var(--line-strong);background:none;color:var(--muted);font-size:12px;cursor:pointer;}
  .atag-clear:hover{color:var(--accent);border-color:var(--accent);}
  /* Language selector */
  .langsel{background:var(--inset);border:1px solid var(--line-strong);color:var(--txt2);border-radius:8px;padding:8px 10px;font-family:var(--sans);font-size:13px;text-transform:none;letter-spacing:0;min-width:110px;max-width:100%;}
  /* Code line numbers */
  pre.code{display:flex;gap:12px;}
  pre.code .gutter{flex:none;text-align:right;color:#5a6673;user-select:none;white-space:pre;border-right:1px solid rgba(255,255,255,.07);padding-right:11px;}
  pre.code .codebody{flex:1 1 auto;min-width:0;white-space:pre;overflow-x:auto;display:block;}
  /* Density toggle */
  .density{display:flex;gap:2px;background:var(--inset);border:1px solid var(--line);border-radius:9px;padding:2px;}
  .denbtn{display:flex;align-items:center;justify-content:center;width:30px;height:26px;border:none;background:none;color:var(--dim);border-radius:7px;cursor:pointer;}
  .denbtn svg{width:16px;height:16px;}
  .denbtn.active{background:var(--accent-soft);color:var(--accent);}
  /* Compact list */
  .compactlist{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--surface);}
  .compactrow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;}
  .compactrow:last-child{border-bottom:none;}
  .compactrow:hover{background:var(--accent-soft);}
  .cr-type{display:flex;flex-shrink:0;}
  .cr-type svg{width:16px;height:16px;}
  .cr-title{flex:1;min-width:0;font-size:13.5px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cr-ico{display:flex;flex-shrink:0;}
  .cr-ico svg{width:14px;height:14px;}
  .cr-sys{flex-shrink:0;font-family:var(--mono);font-size:10px;}
  .cr-badge{flex-shrink:0;font-size:9.5px;padding:2px 7px;border-radius:6px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;}
  .cr-date{flex-shrink:0;font-family:var(--mono);font-size:10.5px;color:var(--dim);}
  @media(max-width:620px){.cr-sys,.cr-date{display:none;}}
  /* Empty state */
  .empty-art{color:var(--dim);opacity:.85;margin-bottom:8px;}
  .empty-title{font-size:16px;font-weight:600;color:var(--txt);}
  .empty-sub{font-size:13px;color:var(--dim);margin:6px auto 0;max-width:360px;line-height:1.5;}
  /* Skeleton */
  @keyframes shimmer{0%{background-position:-450px 0;}100%{background-position:450px 0;}}
  .skel{background:linear-gradient(90deg,var(--line2) 25%,rgba(148,163,184,.18) 37%,var(--line2) 63%);background-size:900px 100%;animation:shimmer 1.4s infinite linear;border-radius:7px;}
  .skelcard{pointer-events:none;}
  /* Entrance animations */
  @keyframes cardin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .cards .card,.compactrow{animation:cardin .26s ease both;}
  @keyframes overlayin{from{opacity:0;}to{opacity:1;}}
  .overlay{animation:overlayin .18s ease;}
  @keyframes modalpop{from{opacity:0;transform:translateY(12px) scale(.985);}to{opacity:1;transform:none;}}
  .modal{animation:modalpop .24s cubic-bezier(.2,.7,.3,1) both;}
  @media (prefers-reduced-motion: reduce){.cards .card,.compactrow,.overlay,.modal,.skel{animation:none;}}
  /* Chat */
  .chat2{display:grid;grid-template-columns:328px 1fr;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--panel);height:calc(100vh - 168px);min-height:460px;box-shadow:0 18px 50px -28px rgba(0,0,0,.5);}
  .chat2-list{display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--line);background:var(--panel2);}
  .chat2-listhead{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;}
  .chat2-h{font-family:var(--mono);font-size:19px;font-weight:600;margin:0;letter-spacing:-.02em;color:var(--txt);}
  .chat-notif{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 11px;flex-shrink:0;border-radius:10px;border:1px solid var(--line-strong);background:var(--panel);color:var(--muted);cursor:pointer;transition:color .15s,border-color .15s,background .15s;}
  .chat-notif svg{width:16px;height:16px;}
  .chat-notif-lbl{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.01em;}
  .chat-notif:hover{color:var(--accent);border-color:var(--accent);}
  .chat-notif.on{background:rgba(52,211,153,.13);border-color:rgba(52,211,153,.42);color:#34d399;}
  .chat-search{display:flex;align-items:center;gap:8px;margin:0 14px 10px;padding:9px 12px;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--muted);}
  .chat-search:focus-within{border-color:var(--accent);}
  .chat-search svg{width:16px;height:16px;flex-shrink:0;}
  .chat-search input{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--txt);font-family:var(--sans);font-size:14px;}
  .chat-search-x{border:none;background:none;color:var(--dim);cursor:pointer;display:flex;padding:0;}
  .convs{flex:1;overflow-y:auto;padding:4px 8px 12px;display:flex;flex-direction:column;gap:1px;}
  .convs-sec{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);padding:13px 12px 5px;}
  .convs::-webkit-scrollbar,.chat-msgs::-webkit-scrollbar{width:8px;}
  .convs::-webkit-scrollbar-thumb,.chat-msgs::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;border:2px solid transparent;background-clip:padding-box;}
  .conv{position:relative;display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 11px;border-radius:12px;border:none;background:none;cursor:pointer;color:var(--txt);font-family:var(--sans);transition:background .12s;}
  .conv:hover{background:var(--surface);}
  .conv.active{background:var(--accent-soft);}
  .conv.active::before{content:"";position:absolute;left:3px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:3px;background:var(--accent);}
  .conv-av{position:relative;width:42px;height:42px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:600;background:var(--accent-soft);color:var(--accent);}
  .conv-av svg{width:20px;height:20px;}
  .conv-av:has(svg){background:rgba(45,212,191,.16);color:var(--accent2,#2dd4bf);}
  .conv-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .conv-name{font-size:14px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .conv-prev{font-size:12.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .conv.unread .conv-name{font-weight:700;}
  .conv.unread .conv-prev{color:var(--txt);font-weight:500;}
  .conv-meta{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px;min-height:34px;}
  .conv-time{font-size:10.5px;color:var(--dim);font-family:var(--mono);min-height:13px;}
  .conv.unread .conv-time{color:var(--accent);}
  .conv-badge{min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--accent);color:#1a1206;font-family:var(--mono);font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .chat2-thread{display:flex;flex-direction:column;min-height:0;background:var(--panel);}
  .chat2-thhead{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--panel2);}
  .chat2-thhead .conv-av{width:38px;height:38px;}
  .chat-back{display:none;border:none;background:none;color:var(--txt);cursor:pointer;padding:4px;margin:-4px -2px -4px -6px;}
  .chat-back svg{width:22px;height:22px;}
  .chat2-thtitle{display:flex;flex-direction:column;gap:1px;min-width:0;}
  .chat-msgs{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:7px;padding:16px;}
  .chat-empty{margin:auto;text-align:center;color:var(--dim);font-size:13px;padding:20px;max-width:260px;line-height:1.5;}
  .chat-hint{color:var(--dim);font-size:13px;padding:16px 14px;text-align:center;line-height:1.5;}
  .chat-day{align-self:center;margin:10px 0 5px;font-size:10.5px;color:var(--muted);background:var(--surface);border:1px solid var(--line);padding:3px 12px;border-radius:20px;font-family:var(--mono);letter-spacing:.02em;}
  .bubble-row{display:flex;}
  .bubble-row.me{justify-content:flex-end;}
  .bubble-row.grp{margin-top:-5px;}
  .bubble{max-width:74%;padding:7px 12px 5px;border-radius:15px 15px 15px 5px;background:var(--surface);border:1px solid var(--line);box-shadow:0 1px 2px rgba(0,0,0,.06);}
  .bubble-row.me .bubble{border-radius:15px 15px 5px 15px;background:var(--accent-soft);border-color:rgba(245,165,36,.32);}
  .bubble-row.grp .bubble{border-radius:15px;}
  .bubble-name{font-size:11.5px;color:var(--accent2,#2dd4bf);font-weight:700;margin-bottom:2px;}
  .bubble-body{font-size:14px;color:var(--txt);white-space:pre-wrap;word-break:break-word;line-height:1.45;}
  .bubble-time{font-size:9.5px;color:var(--dim);font-family:var(--mono);margin-top:2px;text-align:right;}
  .chat-input{display:flex;gap:9px;align-items:flex-end;padding:12px 14px;border-top:1px solid var(--line);background:var(--panel2);}
  .chat-input textarea{flex:1;resize:none;min-height:42px;max-height:120px;background:var(--panel);border:1px solid var(--line);border-radius:21px;color:var(--txt);padding:10px 16px;font-family:var(--sans);font-size:14px;line-height:1.4;}
  .chat-input textarea:focus{outline:none;border-color:var(--accent);}
  .chat-send{flex-shrink:0;width:42px;height:42px;border-radius:50%;border:none;background:var(--accent);color:#1a1206;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,opacity .12s;}
  .chat-send svg{width:19px;height:19px;}
  .chat-send:not(:disabled):hover{transform:scale(1.06);}
  .chat-send:disabled{opacity:.4;cursor:default;}
  .att-wrap{position:relative;flex-shrink:0;}
  .chat-attach{flex-shrink:0;width:42px;height:42px;border-radius:50%;border:1px solid var(--line-strong);background:var(--inset);color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;line-height:1;}
  .chat-attach:not(:disabled):hover{color:var(--txt);border-color:var(--accent);}
  .chat-attach svg{width:20px;height:20px;}
  .att-menu{position:absolute;bottom:52px;left:0;background:var(--panel2);border:1px solid var(--line-strong);border-radius:13px;padding:6px;display:flex;flex-direction:column;gap:2px;box-shadow:0 14px 36px rgba(0,0,0,.45);z-index:40;min-width:158px;}
  .att-menu button{display:flex;align-items:center;gap:11px;padding:11px 13px;border:none;background:transparent;color:var(--txt);font-family:var(--sans);font-size:14px;border-radius:9px;cursor:pointer;text-align:left;width:100%;}
  .att-menu button:hover{background:var(--inset);}
  .att-menu button svg{width:18px;height:18px;color:var(--accent);}
  .att-img{display:block;max-width:220px;border-radius:13px;overflow:hidden;margin-bottom:5px;}
  .att-img img{display:block;width:100%;height:auto;}
  .att-loc,.att-file{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:12px;background:var(--inset);border:1px solid var(--line);color:var(--txt);text-decoration:none;margin-bottom:5px;max-width:250px;}
  .att-loc svg,.att-file svg{width:22px;height:22px;flex-shrink:0;color:var(--accent);}
  .att-loc span,.att-file span{display:flex;flex-direction:column;min-width:0;}

  .att-reply{display:flex;flex-direction:column;gap:1px;padding:6px 10px;margin-bottom:5px;border-left:3px solid var(--accent);background:var(--inset);border-radius:7px;max-width:250px;}
  .att-reply b{font-size:12px;color:var(--accent);font-weight:600;}
  .att-reply span{font-size:12.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bubble.me .att-reply{background:rgba(0,0,0,.18);border-left-color:rgba(255,255,255,.6);}
  .bubble.me .att-reply b{color:#fff;}
  .att-ref{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:12px;background:var(--inset);border:1px solid var(--line);color:var(--txt);margin-bottom:5px;max-width:250px;width:100%;cursor:pointer;font-family:var(--sans);text-align:left;}
  .att-ref svg{width:22px;height:22px;flex-shrink:0;color:var(--accent);}
  .att-ref span{display:flex;flex-direction:column;min-width:0;}
  .att-ref b{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .att-ref small{font-size:11.5px;color:var(--dim);margin-top:1px;}
  .att-ref:hover{border-color:var(--accent);}
  .bubble.me .att-ref{background:rgba(0,0,0,.18);border-color:rgba(0,0,0,.18);}
  .msg-actions{display:flex;align-items:center;gap:1px;align-self:center;flex-shrink:0;}
  .msg-act{width:28px;height:28px;border:none;background:transparent;color:var(--dim);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.32;transition:opacity .15s,background .15s,color .15s;}
  .msg-act svg{width:15px;height:15px;}
  .msg-act:hover{opacity:1;background:var(--inset);color:var(--accent);}

  .bubble-row.me .msg-actions{order:-1;}
  .edited{color:var(--dim);font-size:10.5px;font-style:italic;}
  .share-modal{max-width:440px;}
  .share-row{display:flex;align-items:center;gap:12px;width:100%;padding:10px 12px;border:1px solid var(--line);background:var(--inset);border-radius:13px;cursor:pointer;color:var(--txt);text-align:left;margin-bottom:8px;font-family:var(--sans);}
  .share-row:hover{border-color:var(--accent);}
  .share-row .conv-av{width:38px;height:38px;}
  .share-main{display:flex;flex-direction:column;min-width:0;}
  .share-main b{font-size:14px;font-weight:600;}
  .share-main small{font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .reply-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--inset);border-top:1px solid var(--line);}
  .reply-q{flex:1;min-width:0;display:flex;flex-direction:column;border-left:3px solid var(--accent);padding-left:9px;}
  .reply-q b{font-size:12px;color:var(--accent);font-weight:600;}
  .reply-q span{font-size:12.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .reply-x{flex-shrink:0;width:30px;height:30px;border:none;background:transparent;color:var(--dim);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .reply-x svg{width:17px;height:17px;}
  .reply-x:hover{background:var(--panel2);color:var(--txt);}
  .onl-dot{position:absolute;right:-1px;bottom:-1px;width:12px;height:12px;border-radius:50%;background:#34d399;border:2.5px solid var(--panel);box-shadow:0 0 0 1px rgba(52,211,153,.4);}
  .conv-prev.typing{color:var(--accent);font-style:italic;}
  .typing-bubble{display:flex;align-items:center;gap:5px;padding:11px 14px;}
  .typing-bubble .tdot{width:7px;height:7px;border-radius:50%;background:var(--dim);animation:tbnce 1.2s infinite ease-in-out;}
  .typing-bubble .tdot:nth-child(2){animation-delay:.18s;}
  .typing-bubble .tdot:nth-child(3){animation-delay:.36s;}
  @keyframes tbnce{0%,60%,100%{transform:translateY(0);opacity:.45;}30%{transform:translateY(-4px);opacity:1;}}
  @media(max-width:860px){
    .chat2{grid-template-columns:1fr;height:calc(100dvh - 150px);border:none;border-radius:0;background:none;box-shadow:none;}
    .chat2-list{border-right:none;background:none;}
    .chat2-listhead{padding:2px 2px 10px;}
    .chat2-h{font-size:22px;}
    .chat-search{margin:0 0 10px;}
    .convs{padding:0;}
    .chat2-thread{display:none;}
    .chat2.show-thread .chat2-list{display:none;}
    .chat2.show-thread .chat2-thread{display:flex;height:calc(100dvh - 150px);margin:calc(-1 * (14px + env(safe-area-inset-top))) -15px 0;border-radius:0;}
    .chat2.show-thread .chat2-thhead{padding-top:calc(12px + env(safe-area-inset-top));}
    .chat-back{display:flex;}
  }
  .nav-ic{position:relative;}
  .nav-bubble{position:absolute;top:-7px;right:-10px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:#f87171;color:#fff;font-size:9.5px;font-family:var(--mono);font-weight:600;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
  .person-dot{width:8px;height:8px;border-radius:50%;background:#f87171;margin-left:3px;}
  /* Comments */
  .comments{border-top:1px solid var(--line);padding-top:14px;margin-top:6px;}
  .cmt-empty{color:var(--dim);font-size:13px;line-height:1.5;margin-bottom:12px;}
  .cmt{padding:12px 0;border-bottom:1px solid var(--line);}
  .cmt:first-of-type{padding-top:0;}
  .cmt-head{display:flex;align-items:center;gap:9px;margin-bottom:5px;}
  .cmt-av{width:30px;height:30px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;flex-shrink:0;}
  .cmt-name{font-size:13px;font-weight:600;color:var(--txt);}
  .cmt-time{font-family:var(--mono);font-size:10.5px;color:var(--dim);}
  .cmt-del{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;display:flex;padding:3px;border-radius:6px;}
  .cmt-del:hover{color:var(--danger);background:rgba(248,113,113,.1);}
  .cmt-del svg{width:14px;height:14px;}
  .cmt-body{font-size:14px;color:var(--txt2);line-height:1.55;white-space:pre-wrap;word-break:break-word;padding-left:39px;}
  .cmt-input{display:flex;flex-direction:column;gap:9px;margin-top:16px;}
  .cmt-input textarea{resize:vertical;min-height:48px;border-radius:13px;font-family:var(--sans);}
  .cmt-input .foot-btn{align-self:flex-end;flex:0 0 auto;padding:9px 16px;}
  /* Multiple code blocks */
  .code-wrap + .code-wrap{margin-top:10px;}
  .readmore{margin-top:8px;background:none;border:none;color:var(--accent);font-size:12.5px;font-family:var(--sans);cursor:pointer;padding:4px 0;align-self:flex-start;}
  .readmore:hover{text-decoration:underline;}
  .blocks-edit{display:flex;flex-direction:column;gap:12px;}
  .blockedit{border:1px solid var(--line);border-radius:12px;padding:10px;background:var(--inset);}
  .blockedit-top{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .block-title{flex:1 1 160px;min-width:0;font-family:var(--sans)!important;font-size:13px;padding:8px 10px;}
  .langpick{display:flex;align-items:center;gap:7px;flex-shrink:0;margin-left:auto;}
  .langpick>span{font-size:11px;color:var(--dim);font-family:var(--sans);}
  .blockedit .langsel{margin-left:0;flex-shrink:0;}
  .block-del{flex-shrink:0;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  @media(max-width:560px){
    .block-title{flex:1 1 100%;}
    .langpick{margin-left:0;flex:1 1 100%;}
    .langpick .langsel{flex:1;min-width:0;}
  }
  .block-del:hover{color:var(--danger);border-color:rgba(248,113,113,.4);}
  .addblock{align-self:flex-start;display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);border:1px solid rgba(245,165,36,.35);color:var(--accent);padding:8px 13px;border-radius:10px;font-size:13px;font-family:var(--sans);cursor:pointer;}
  .addblock:hover{border-color:var(--accent);}
  /* Template fill */
  .tplfill{border:1px solid rgba(245,165,36,.3);background:var(--accent-soft);border-radius:12px;padding:12px 14px;margin-bottom:12px;}
  .tplfields{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:6px;}
  .tplfield{display:flex;flex-direction:column;gap:4px;}
  .tplfield span{font-family:var(--mono);font-size:11px;color:var(--accent);}
  .tplfield input{padding:8px 10px;font-family:var(--mono);font-size:13px;}
  .tplhint{font-size:12px;color:var(--dim);margin-top:2px;}
  .tplhint code{font-family:var(--mono);background:var(--inset);padding:1px 5px;border-radius:5px;color:var(--accent);}
  /* Checklist display */
  .checklist{margin-top:4px;}
  .cl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .cl-prog{font-family:var(--mono);font-size:12px;color:var(--txt2);display:inline-flex;align-items:center;gap:5px;}
  .cl-prog.done{color:var(--ok);}
  .cl-prog.done svg{width:14px;height:14px;}
  .cl-reset{background:none;border:1px solid var(--line);color:var(--dim);font-size:11px;border-radius:8px;padding:4px 9px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);}
  .cl-reset:hover{color:var(--accent);border-color:var(--accent);}
  .cl-reset svg{width:12px;height:12px;}
  .cl-items{display:flex;flex-direction:column;gap:6px;}
  .cl-item{display:flex;align-items:flex-start;gap:10px;text-align:left;background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;font-family:var(--sans);color:var(--txt);width:100%;}
  .cl-item:hover{border-color:var(--line-strong);}
  .cl-item.ro{cursor:default;}
  .cl-box{flex-shrink:0;width:20px;height:20px;border-radius:6px;border:2px solid var(--line-strong);display:flex;align-items:center;justify-content:center;color:#fff;margin-top:1px;}
  .cl-box svg{width:13px;height:13px;}
  .cl-item.done .cl-box{background:var(--ok,#34d399);border-color:var(--ok,#34d399);}
  .cl-text{font-size:14px;line-height:1.4;}
  .cl-item.done .cl-text{text-decoration:line-through;color:var(--dim);}
  /* Steps editor */
  .steps-edit{display:flex;flex-direction:column;gap:8px;}
  .stepedit{display:flex;align-items:center;gap:8px;}
  .step-num{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;}
  .stepedit input{flex:1;min-width:0;}
  .typechip.is-check{background:rgba(52,211,153,.14);color:#34d399;}
  /* File attachments */
  .filelist{display:flex;flex-direction:column;gap:7px;}
  .card-files,.detail-files{margin-top:12px;}
  .fileitem{display:flex;align-items:center;gap:10px;background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:9px 12px;text-decoration:none;color:var(--txt);}
  .fileitem.dl:hover{border-color:var(--accent);}
  .file-ic{flex-shrink:0;color:var(--accent);display:flex;}
  .file-ic svg{width:16px;height:16px;}
  .file-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;}
  .file-size{flex-shrink:0;font-family:var(--mono);font-size:11px;color:var(--dim);}
  .file-dl{flex-shrink:0;color:var(--dim);display:flex;}
  .file-dl svg{width:15px;height:15px;}
  .fileitem.dl:hover .file-dl{color:var(--accent);}
  .file-del{flex-shrink:0;background:none;border:none;color:var(--dim);cursor:pointer;display:flex;padding:3px;border-radius:6px;}
  .file-del:hover{color:var(--danger);background:rgba(248,113,113,.1);}
  .file-del svg{width:14px;height:14px;}
  .file-more{font-size:12px;color:var(--dim);padding:2px 2px;}
  .filesection{margin-top:16px;}
  /* QR modal */
  .qroverlay{z-index:60;}
  .qrmodal{max-width:360px;}
  .qr-title{font-size:15px;font-weight:600;color:var(--txt);margin:0 0 14px;}
  .qrbox{display:inline-flex;align-items:center;justify-content:center;background:#fff;padding:14px;border-radius:14px;min-height:160px;min-width:160px;}
  .qrbox img,.qrbox canvas{display:block;}
  .qr-hint{font-size:12.5px;color:var(--dim);line-height:1.5;margin:14px auto 0;max-width:280px;}
  .qr-link{font-family:var(--mono);font-size:11px;color:var(--txt2);background:var(--inset);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:12px;word-break:break-all;}
  .qr-actions{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
  /* What's new feed */
  .feed{display:flex;flex-direction:column;}
  .feed-row{display:flex;align-items:flex-start;gap:11px;padding:10px 4px;border:none;border-bottom:1px solid var(--line);background:none;cursor:pointer;text-align:left;width:100%;}
  .feed-row:last-child{border-bottom:none;}
  .feed-row:hover{background:var(--accent-soft);border-radius:8px;}
  .feed-ic{flex-shrink:0;display:flex;margin-top:2px;}
  .feed-ic svg{width:17px;height:17px;}
  .feed-main{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1;}
  .feed-title{font-size:14px;color:var(--txt);font-weight:500;display:flex;align-items:center;gap:8px;}
  .feed-new{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:#f87171;color:#fff;border-radius:5px;padding:1px 6px;flex-shrink:0;}
  .feed-meta{font-size:12px;color:var(--dim);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  /* Push notif button */
  .notifbtn{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;background:var(--inset);border:1px solid var(--line-strong);color:var(--txt2);border-radius:10px;padding:8px 12px;font-size:13px;font-family:var(--sans);cursor:pointer;}
  .notifbtn:hover{border-color:var(--accent);color:var(--accent);}
  .notifbtn svg{width:15px;height:15px;}
  .notifbtn.on{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.4);color:#34d399;cursor:default;}
  .notifmsg{font-size:12.5px;color:var(--dim);margin:-4px 0 12px;}
  .pdfbtn{display:inline-flex;align-items:center;gap:6px;background:var(--inset);border:1px solid var(--line);color:var(--txt2);border-radius:9px;padding:6px 11px;font-size:12.5px;font-family:var(--sans);cursor:pointer;}
  .pdfbtn:hover{border-color:var(--accent);color:var(--accent);}
  .pdfbtn svg{width:15px;height:15px;}
  /* Display modes: large text + high contrast */
  .hbtn.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
  body.bigtext .main{zoom:1.16;}
  body.bigtext .modal{zoom:1.12;}
  body.contrast{background:#ffffff !important;}
  body.contrast .grid-bg{display:none;}
  body.contrast{
    --bg:#ffffff;--surface:#ffffff;--surface2:#eceef0;--panel:#ffffff;--glass:#ffffff;
    --txt:#000000;--txt2:#141414;--dim:#3b3b3b;--muted:#3b3b3b;
    --line:#9aa0a6;--line-strong:#5f6368;
    --accent:#8a4b00;--accent-soft:#ffeccd;
    --code:#f1f1f1;--inset:#f1f1f1;
  }
  body.contrast .card,body.contrast .panel,body.contrast .compactlist{border-width:1.5px;}
  body.contrast .topbar,body.contrast .nav{background:#ffffff;}
  /* Falt-lage: stora trafftor for anvandning ute vid station */
  body.field button:not(.navbtn):not(.x):not(.more):not(.chat-send):not(.chat-attach):not(.cl-item),
  body.field .foot-mini,body.field .chip,body.field .seg .segbtn{min-height:52px;}
  body.field input,body.field textarea,body.field select{min-height:52px;font-size:16px;}
  body.field .chat-send,body.field .chat-attach{width:50px;height:50px;}
  body.field .card{padding:18px;}
  body.field .chip{padding:11px 16px;}
  .larm-search{display:flex;align-items:center;gap:10px;background:var(--inset);border:1px solid var(--line-strong);border-radius:12px;padding:11px 14px;margin-bottom:14px;}
  .larm-search svg{width:18px;height:18px;color:var(--dim);flex-shrink:0;}
  .larm-search input{flex:1;border:none;background:transparent;color:var(--txt);font-family:var(--sans);font-size:15px;outline:none;}
  .larm-form{background:var(--surface);border:1px solid var(--line-strong);border-radius:14px;padding:14px;margin-bottom:16px;display:flex;flex-direction:column;gap:9px;}
  .larm-form input,.larm-form textarea{width:100%;background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--txt);font-family:var(--sans);font-size:14px;}
  .larm-frow{display:flex;gap:9px;}
  .larm-frow input{flex:1;min-width:0;}
  .larm-fact{display:flex;justify-content:flex-end;gap:9px;margin-top:3px;}
  .btn-ghost{background:var(--inset);border:1px solid var(--line);color:var(--txt2);border-radius:10px;padding:10px 16px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;}
  .larm-list{display:flex;flex-direction:column;gap:11px;}
  .larm-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 15px;}
  .larm-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .larm-code{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--accent);background:var(--accent-soft);border:1px solid var(--line-strong);border-radius:8px;padding:4px 10px;}
  .larm-sys{font-family:var(--mono);font-size:11px;color:var(--txt2);background:var(--inset);border:1px solid var(--line);border-radius:7px;padding:3px 9px;text-transform:uppercase;letter-spacing:.04em;}
  .larm-acts{margin-left:auto;display:flex;gap:4px;}
  .larm-title{font-size:15px;font-weight:600;color:var(--txt);margin-top:9px;}
  .larm-field{display:flex;flex-direction:column;gap:1px;margin-top:9px;}
  .larm-field b{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);font-weight:600;}
  .larm-field span{font-size:14px;color:var(--txt2);line-height:1.5;}
  .cmdk-back{position:fixed;inset:0;background:rgba(4,7,11,.6);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:56px 16px;}
  body.light .cmdk-back{background:rgba(15,23,42,.35);}
  .cmdk{width:100%;max-width:560px;background:var(--panel2);border:1px solid var(--line-strong);border-radius:16px;box-shadow:0 30px 70px -20px rgba(0,0,0,.6);overflow:hidden;animation:cardIn .16s ease both;}
  .cmdk-in{display:flex;align-items:center;gap:11px;padding:15px 16px;border-bottom:1px solid var(--line);}
  .cmdk-in svg{width:19px;height:19px;color:var(--dim);flex-shrink:0;}
  .cmdk-in input{flex:1;border:none;background:transparent;color:var(--txt);font-family:var(--sans);font-size:16px;outline:none;}
  .cmdk-esc{font-family:var(--mono);font-size:10px;color:var(--dim);border:1px solid var(--line);border-radius:6px;padding:2px 7px;}
  .cmdk-body{max-height:60vh;overflow-y:auto;padding:7px;}
  .cmdk-lbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);padding:9px 10px 5px;}
  .cmdk-row{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:transparent;color:var(--txt);font-family:var(--sans);font-size:14.5px;padding:10px 11px;border-radius:9px;cursor:pointer;}
  .cmdk-row:hover{background:var(--inset);}
  .cmdk-ic{display:flex;color:var(--accent);flex-shrink:0;}
  .cmdk-ic svg{width:17px;height:17px;}
  .cmdk-txt{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cmdk-txt small{color:var(--dim);}
  .cmdk-empty{padding:24px;text-align:center;color:var(--dim);font-size:14px;}
  @keyframes cardIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

const VAPID_PUBLIC = "BK7xHRzgF1kbm_lVzIAru9AKkPJ1CSXv4H-au_aPwBNeiCOZcMh2WnJWc9VU4yXZwosCyvjn4QQqJsvitJZ6uys";

function urlB64ToUint8(base64){ const pad="=".repeat((4-base64.length%4)%4); const b=(base64+pad).replace(/-/g,"+").replace(/_/g,"/"); const raw=atob(b); const arr=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i); return arr; }
function pushSupported(){ return typeof window!=="undefined" && "Notification" in window && "serviceWorker" in navigator && "PushManager" in window; }
async function enablePush(token, uid){
  if(!pushSupported()) throw new Error("Stöds ej här. Lägg appen på hemskärmen och öppna därifrån.");
  if(!uid) throw new Error("Saknar användar-id (uid). Logga ut och in igen.");
  if(!token) throw new Error("Saknar token. Logga ut och in igen.");
  let perm;
  try{ perm = await Notification.requestPermission(); }catch(e){ throw new Error("Steg lov: "+(e.message||e)); }
  if(perm!=="granted") throw new Error("Lov nekades (status: "+perm+")");
  let reg = null;
  try{ reg = await navigator.serviceWorker.getRegistration(); }catch(e){}
  if(!reg){
    try{ reg = await navigator.serviceWorker.register("sw.js"); }
    catch(e){ throw new Error("Steg SW-reg: "+(e.message||e)); }
  }
  const swStart = Date.now();
  while(reg && !reg.active && (Date.now()-swStart) < 12000){
    await new Promise(r=>setTimeout(r, 400));
    try{ reg = (await navigator.serviceWorker.getRegistration()) || reg; }catch(e){}
  }
  if(!reg || !reg.active){ throw new Error("Steg SW: blev inte aktiv. Stäng appen helt (svep upp), öppna igen, vänta 5 sek och försök igen."); }
  let sub;
  try{
    const old = await reg.pushManager.getSubscription();
    if(old){ try{ await old.unsubscribe(); }catch(e){} }
    sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlB64ToUint8(VAPID_PUBLIC) });
  }catch(e){ throw new Error("Steg prenumerera: "+(e.message||e)); }
  let r;
  try{
    r = await fetch(pushBase + "?on_conflict=endpoint", {method:"POST", headers:{...dataHeaders(token), Prefer:"resolution=merge-duplicates,return=minimal"}, body: JSON.stringify([{ user_id:uid, endpoint:sub.endpoint, subscription:sub.toJSON() }])});
  }catch(e){ throw new Error("Steg spara (nätverk): "+(e.message||e)); }
  if(!r.ok && r.status!==409){ let t=""; try{ t=await r.text(); }catch(e){} throw new Error("Steg spara nekades ("+r.status+"): "+t.slice(0,140)); }
  return true;
}
function exportEntriesPDF(list, heading){
  if(!(window.jspdf && window.jspdf.jsPDF)){ alert("PDF-biblioteket kunde inte laddas (kräver internet första gången)."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"a4"});
  const M=48, W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), CW=W-M*2;
  let y=M;
  function need(h){ if(y+h>H-M){ doc.addPage(); y=M; } }
  function text(str, o){ o=o||{}; const size=o.size||10, lh=size*1.35; doc.setFont(o.font||"helvetica", o.style||"normal"); doc.setFontSize(size); const c=o.color||[25,25,25]; doc.setTextColor(c[0],c[1],c[2]); const lines=doc.splitTextToSize(String(str||""), o.width||CW); for(const ln of lines){ need(lh); doc.text(ln, o.x||M, y); y+=lh; } }
  function rule(col){ need(2); doc.setDrawColor(col||230); doc.line(M,y,W-M,y); y+=14; }
  text(heading||"SCADA-KB", {size:16, style:"bold"});
  text(new Date().toLocaleString("sv-SE",{dateStyle:"medium",timeStyle:"short"})+"  ·  "+list.length+" poster", {size:9, color:[130,130,130]});
  y+=6; rule(210);
  list.forEach(e=>{
    need(46);
    text(e.title, {size:13, style:"bold"});
    const meta=[(e.system||"Ignition"), e.category, e.station].filter(Boolean).join("   ·   ");
    if(meta) text(meta, {size:9, color:[120,120,120]});
    if(e.tags&&e.tags.length) text("Taggar: "+e.tags.join(", "), {size:9, color:[120,120,120]});
    y+=4;
    const kind=(e.checklist&&e.checklist.length)?"checklist":(((e.blocks&&e.blocks.length)||e.is_code)?"code":"note");
    if(e.notes && e.notes.trim()) text(e.notes, {size:10});
    if(kind==="note"){ text(e.content||"", {size:10}); }
    else if(kind==="checklist"){ (e.checklist||[]).forEach(s=>text("[ ]  "+s, {size:10})); }
    else if(kind==="code"){
      const blocks=(e.blocks&&e.blocks.length)?e.blocks:[{title:"",code:e.content||"",lang:e.lang}];
      blocks.forEach(b=>{ if(b.title) text(b.title, {size:9, style:"bold", color:[90,90,90]}); text(b.code||"", {size:8.5, font:"courier", color:[40,40,40]}); y+=4; });
    }
    if(e.images&&e.images.length) text("("+e.images.length+" bild"+(e.images.length>1?"er":"")+" finns i appen)", {size:8.5, color:[150,150,150]});
    if(e.files&&e.files.length) text("Bilagor: "+e.files.map(f=>f.name).join(", "), {size:9, color:[120,120,120]});
    y+=10; rule(238);
  });
  const pages=doc.internal.getNumberOfPages();
  for(let p=1;p<=pages;p++){ doc.setPage(p); doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(160); doc.text("SCADA-KB  ·  sida "+p+"/"+pages, M, H-20); }
  const fname=(heading||"scada-kb").replace(/[^a-z0-9åäöÅÄÖ ]/gi,"").trim().replace(/\s+/g,"-").toLowerCase()||"scada-kb";
  doc.save(fname+".pdf");
}

const CHAT_BUCKET = "chat-files";
async function uploadChatFile(token, file){
  const safe = (file.name||"fil").replace(/[^a-zA-Z0-9._-]/g,"_").slice(-60);
  const path = (Date.now().toString(36)) + "-" + Math.random().toString(36).slice(2,8) + "-" + safe;
  const r = await fetch(SUPABASE_URL + "/storage/v1/object/" + CHAT_BUCKET + "/" + encodeURIComponent(path), {
    method:"POST",
    headers:{ apikey:SUPABASE_KEY, Authorization:"Bearer "+token, "Content-Type": file.type||"application/octet-stream", "x-upsert":"true" },
    body:file
  });
  if(!r.ok){ let t=""; try{ t=await r.text(); }catch(e){} throw new Error("Uppladdning misslyckades ("+r.status+"): "+t.slice(0,120)); }
  return SUPABASE_URL + "/storage/v1/object/public/" + CHAT_BUCKET + "/" + encodeURIComponent(path);
}
function attachPreview(m){
  const a=(m.attachments||[])[0];
  if(!a) return m.body||"";
  if(a.type==="image") return "📷 Bild";
  if(a.type==="location") return "📍 Plats";
  return "📎 " + (a.name||"Fil");
}
function fmtBytes(n){ if(!n&&n!==0) return ""; if(n<1024) return n+" B"; if(n<1048576) return (n/1024).toFixed(0)+" kB"; return (n/1048576).toFixed(1)+" MB"; }
function entryText(e){ if(!e) return ""; const parts=[e.title||"", e.notes||"", e.content||""]; (e.blocks||[]).forEach(b=>{ if(b&&b.code) parts.push(b.code); }); (e.checklist||[]).forEach(c=>parts.push(typeof c==="string"?c:(c&&c.text)||"")); return parts.filter(s=>s&&s.length).join("\n"); }
function lineDiff(a,b){
  const A=(a||"").split("\n"), B=(b||"").split("\n"); const n=A.length,m=B.length;
  const dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--)for(let j=m-1;j>=0;j--) dp[i][j]=A[i]===B[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
  const out=[]; let i=0,j=0;
  while(i<n&&j<m){ if(A[i]===B[j]){ out.push({t:"same",l:A[i]}); i++;j++; } else if(dp[i+1][j]>=dp[i][j+1]){ out.push({t:"del",l:A[i]}); i++; } else { out.push({t:"add",l:B[j]}); j++; } }
  while(i<n){ out.push({t:"del",l:A[i++]}); }
  while(j<m){ out.push({t:"add",l:B[j++]}); }
  return out;
}
async function fetchChatOverview(token, me){
  const q="or=(sender_id.eq."+me+",recipient_id.eq."+me+",recipient_id.is.null)";
  const r = await fetch(msgBase + "?" + q + "&select=sender_id,recipient_id,body,attachments,created_at&order=created_at.desc&limit=200", {headers: dataHeaders(token)});
  if(!r.ok) return {};
  let rows=[]; try{ rows=await r.json(); }catch(e){ return {}; }
  const ov={};
  rows.forEach(m=>{ const key=m.recipient_id==null?"team":(m.sender_id===me?m.recipient_id:m.sender_id); if(!ov[key]) ov[key]={body:attachPreview(m),at:m.created_at,fromMe:m.sender_id===me}; });
  return ov;
}
async function listVersions(token, entryId){
  const r = await fetch(verBase + "?entry_id=eq." + entryId + "&select=*&order=created_at.desc", {headers: dataHeaders(token)});
  if(!r.ok) throw new Error("Kunde inte hämta historik ("+r.status+")");
  return r.json();
}
function dropCols(x, cols){ const f=o=>{const c={...o}; cols.forEach(k=>delete c[k]); return c;}; return Array.isArray(x)?x.map(f):f(x); }
async function saveWithFallback(url, method, payload, token){
  let body = payload, dropped = [];
  for(let i=0; i<OPTIONAL_COLS.length+1; i++){
    const r = await fetch(url, {method, headers:{...dataHeaders(token), Prefer:"return=representation"}, body: JSON.stringify(body)});
    if(r.status!==400) return r;
    let msg=""; try{ const d=await r.clone().json(); msg=((d.message||"")+" "+(d.details||"")+" "+(d.hint||"")).toLowerCase(); }catch(e){}
    const col = OPTIONAL_COLS.find(c=>dropped.indexOf(c)<0 && msg.indexOf("'"+c+"'")>=0);
    if(col){ dropped.push(col); body = dropCols(body, [col]); continue; }       // drop just the missing column
    const rest = OPTIONAL_COLS.filter(c=>dropped.indexOf(c)<0);
    if(rest.length){ dropped = dropped.concat(rest); body = dropCols(body, rest); continue; } // unknown cause: drop remaining once
    return r;
  }
  return fetch(url, {method, headers:{...dataHeaders(token), Prefer:"return=representation"}, body: JSON.stringify(body)});
}
async function apiInsert(token, rows){
  const r = await saveWithFallback(restBase, "POST", rows, token);
  if (!r.ok) throw new Error("INSERT " + r.status); return r.json();
}
async function apiUpdate(token, id, row){
  const r = await saveWithFallback(restBase + "?id=eq." + id, "PATCH", row, token);
  if (!r.ok) throw new Error("UPDATE " + r.status); return (await r.json())[0];
}

}

    body: JSON.stringify({ email, password })
  });

  });
  let d={}; try{ d=await r.json(); }catch(e){}

  return d;
}
async function getMyProfile(token, uid, email, dispName){
  const r = await fetch(profBase + "?id=eq."+uid+"&select=*", {headers:dataHeaders(token)});
  if(!r.ok) throw new Error("PROFILES "+r.status);
  const arr = await r.json();
  if(arr.length){
    const p=arr[0];
    if(dispName && p.name!==dispName){ try{ await fetch(profBase+"?id=eq."+uid, {method:"PATCH", headers:dataHeaders(token), body:JSON.stringify({name:dispName})}); p.name=dispName; }catch(e){} }
    return p;
  }
  try{
    let r2 = await fetch(profBase, {method:"POST", headers:{...dataHeaders(token),Prefer:"return=representation"}, body:JSON.stringify([{id:uid,email:email||"",approved:false,name:dispName||""}])});
    if(!r2.ok){ r2 = await fetch(profBase, {method:"POST", headers:{...dataHeaders(token),Prefer:"return=representation"}, body:JSON.stringify([{id:uid,email:email||"",approved:false}])}); }
    if(r2.ok){ const a=await r2.json(); return a[0]||{id:uid,approved:false,is_admin:false}; }
  }catch(e){}
  return {id:uid,approved:false,is_admin:false};
}
async function callRpc(token, fn, args){
  const r = await fetch(SUPABASE_URL + "/rest/v1/rpc/" + fn, {method:"POST", headers:dataHeaders(token), body: JSON.stringify(args||{})});
  if(!r.ok){ let m="Fel "+r.status; try{ const d=await r.json(); m=d.message||d.hint||d.error||m; }catch(e){} throw new Error(m); }
  try{ return await r.json(); }catch(e){ return null; }
}

  try{ await fetch(profBase+"?id=eq."+uid, {method:"PATCH", headers:dataHeaders(token), body:JSON.stringify({name:newName})}); }catch(e){}
}

    try{ setProfile(await getMyProfile(d.access_token, id, email, metaName(d))); }
    catch(e){ setProfile({approved:true,is_admin:false,_legacy:true}); } // profiles ej uppsatt → spärra inte
  }
  function logout(){ clearSession(); setToken(null); setUser(""); setName(""); setUid(""); setProfile(undefined); }

  // Återställ sparad inloggning vid start
  useEffect(()=>{
    (async()=>{
      const s = loadSession();
      if(!s || !s.refresh_token){ setBooting(false); return; }
      try{
        let access=s.access_token, uidV=s.uid, emailV=s.email, nameV=s.name;
        if(!access || !s.expires_at || Date.now() > s.expires_at - 60000){
          const d = await refreshSession(s.refresh_token);
          saveSession(d);
          access=d.access_token;
          uidV=(d.user&&d.user.id)||uidV; emailV=(d.user&&d.user.email)||emailV; nameV=metaName(d)||nameV;
        }
        setToken(access); setUser(emailV); setName(nameV); setUid(uidV); setProfile(undefined);
        try{ setProfile(await getMyProfile(access, uidV, emailV, nameV)); }
        catch(e){ setProfile({approved:true,is_admin:false,_legacy:true}); }
      }catch(e){ clearSession(); }
      setBooting(false);
    })();
  },[]);

  // Förnya token automatiskt så man hålls inloggad
  useEffect(()=>{
    if(!token) return;
    async function ensureFresh(){
      const s = loadSession(); if(!s || !s.refresh_token) return;
      if(Date.now() > (s.expires_at||0) - 120000){
        try{ const d=await refreshSession(s.refresh_token); saveSession(d); setToken(d.access_token); }catch(e){}
      }
    }
    const iv=setInterval(ensureFresh, 60000);
    const onVis=()=>{ if(document.visibilityState==="visible") ensureFresh(); };
    document.addEventListener("visibilitychange", onVis);
    return ()=>{ clearInterval(iv); document.removeEventListener("visibilitychange", onVis); };
  },[token]);

  const [updateReady,setUpdateReady]=useState(false);
  const swWaitingRef=useRef(null);
  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    let reloaded=false, onVis=null;
    const onCtrl=()=>{ if(reloaded) return; reloaded=true; window.location.reload(); };
    navigator.serviceWorker.addEventListener("controllerchange", onCtrl);
    navigator.serviceWorker.getRegistration().then(function(reg){
      if(!reg) return;
      const mark=function(w){ if(w && navigator.serviceWorker.controller){ swWaitingRef.current=w; setUpdateReady(true); } };
      if(reg.waiting) mark(reg.waiting);
      reg.addEventListener("updatefound", function(){ const w=reg.installing; if(!w) return; w.addEventListener("statechange", function(){ if(w.state==="installed") mark(w); }); });
      const check=function(){ try{ reg.update(); }catch(e){} };
      check();
      onVis=function(){ if(document.visibilityState==="visible") check(); };
      document.addEventListener("visibilitychange", onVis);
    }).catch(function(){});
    return function(){ navigator.serviceWorker.removeEventListener("controllerchange", onCtrl); if(onVis) document.removeEventListener("visibilitychange", onVis); };
  },[]);
  function applyUpdate(){
    const w=swWaitingRef.current;
    if(w){ try{ w.postMessage("skipWaiting"); }catch(e){ window.location.reload(); } }
    else { window.location.reload(); }
  }

  let view;
  if (!configured) view = (<div className="wrap"><div className="banner err" style={{marginTop:40}}>Inte konfigurerad. Fyll i <b>SUPABASE_URL</b> och <b>SUPABASE_KEY</b>.</div></div>);
  else if (booting) view = (<div className="login-wrap"><div className="login-card" style={{textAlign:"center"}}><div className="login-logo">{Ico.db}</div><p>Laddar…</p></div></div>);
  else if (!token) view = <Login onLogin={afterLogin} theme={theme} onToggleTheme={toggleTheme} />;
  else if (profile===undefined) view = (<div className="login-wrap"><div className="login-card" style={{textAlign:"center"}}><div className="login-logo">{Ico.db}</div><p>Laddar…</p></div></div>);
  else if (profile && !profile.approved && !profile._legacy) view = <Pending email={user} onLogout={logout} theme={theme} onToggleTheme={toggleTheme} />;
  else if (profile && !profile.org_id && !profile._legacy) view = <OrgOnboarding token={token} onLogout={logout} theme={theme} onToggleTheme={toggleTheme} onDone={async()=>{ setProfile(undefined); try{ setProfile(await getMyProfile(token, uid, user, name)); }catch(e){ setProfile({approved:true,is_admin:false,_legacy:true}); } }} />;
  else view = <KB token={token} user={user} name={name} uid={uid} isAdmin={!!(profile&&(profile.role==="owner"||profile.role==="admin"))} onName={setName} theme={theme} onToggleTheme={toggleTheme} bigText={bigText} onToggleBig={toggleBig} contrast={contrast} onToggleContrast={toggleContrast} fieldMode={fieldMode} onToggleField={toggleField} onLogout={logout} />;
  return (<>{updateReady && <div className="update-bar"><span>{Ico.spark} Ny version finns</span><button onClick={applyUpdate}>Uppdatera</button></div>}{view}</>);
}

function ChecklistRuns({entry, token, runner}){
  const baseItems=(entry.checklist||[]).map(c=>typeof c==="string"?c:(c&&c.text)||"");
  const [runs,setRuns]=useState(null);
  const [active,setActive]=useState(null);
  const [busy,setBusy]=useState(false);
  useEffect(()=>{ (async()=>{
    try{ const r=await fetch(runBase+"?entry_id=eq."+entry.id+"&select=*&order=started_at.desc",{headers:dataHeaders(token)}); setRuns(r.ok?await r.json():[]); }catch(e){ setRuns([]); }
  })(); },[entry.id]);
  async function start(){
    setBusy(true);
    const row={ entry_id:entry.id, title:entry.title||"", runner:runner||"", items:baseItems.map(t=>({text:t,done:false})) };
    try{ const r=await fetch(runBase,{method:"POST",headers:{...dataHeaders(token),Prefer:"return=representation"},body:JSON.stringify([row])}); const ins=(await r.json())[0]; setActive(ins); setRuns(x=>[ins,...(x||[])]); }
    catch(e){ alert("Kunde inte starta körning"); }
    setBusy(false);
  }
  async function patch(run, fields){
    try{ const r=await fetch(runBase+"?id=eq."+run.id,{method:"PATCH",headers:{...dataHeaders(token),Prefer:"return=representation"},body:JSON.stringify(fields)}); const upd=(await r.json())[0]; setRuns(x=>(x||[]).map(z=>z.id===run.id?upd:z)); if(active&&active.id===run.id) setActive(fields.finished_at?null:upd); return upd; }catch(e){}
  }
  function toggle(i){ if(!active) return; const items=active.items.map((it,k)=>k===i?{...it,done:!it.done}:it); setActive({...active,items}); patch(active,{items}); }
  function finish(){ if(active) patch(active,{finished_at:new Date().toISOString()}); }
  async function del(id){ setRuns(x=>(x||[]).filter(z=>z.id!==id)); if(active&&active.id===id) setActive(null); try{ await fetch(runBase+"?id=eq."+id,{method:"DELETE",headers:dataHeaders(token)}); }catch(e){} }
  if(baseItems.length===0) return null;
  return (
    <div className="runs">
      <div className="related-h">{Ico.checklist} Körningar (protokoll)</div>
      {active ? (
        <div className="run-active">
          <div className="run-ahead">Pågående · {active.runner||"du"}</div>
          {active.items.map((it,i)=>(
            <button key={i} className={"cl-item"+(it.done?" done":"")} onClick={()=>toggle(i)}>
              <span className={"cl-box"+(it.done?" on":"")}>{it.done?Ico.check:null}</span>
              <span className="cl-text">{it.text}</span>
            </button>
          ))}
          <div className="run-fact">
            <span className="run-prog">{active.items.filter(x=>x.done).length}/{active.items.length} klara</span>
            <button className="btn-amber" onClick={finish}>{Ico.check} Slutför</button>
          </div>
        </div>
      ) : (
        <button className="foot-mini" disabled={busy} onClick={start}>{Ico.add} Starta ny körning</button>
      )}
      {runs && runs.length>0 && <div className="runlist">
        {runs.map(r=>{ const done=(r.items||[]).filter(x=>x.done).length; const tot=(r.items||[]).length; const fin=!!r.finished_at;
          return <div key={r.id} className="runrow">
            <span className={"run-dot"+(fin?" done":"")}></span>
            <div className="run-main">
              <div className="run-top">{r.runner||"—"} <small>{fmtDateTime(r.started_at)}</small></div>
              <div className="run-sub">{fin?"Klar":"Pågår"} · {done}/{tot} klara</div>
            </div>
            <button className="ibtn" title="Ta bort" onClick={()=>{ if(confirm("Ta bort körningen?")) del(r.id); }}>{Ico.trash}</button>
          </div>;
        })}
      </div>}
    </div>
  );
}
function renderMentions(text, names){
  if(!text) return text;
  const esc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  const sorted=(names||[]).filter(Boolean).slice().sort((a,b)=>b.length-a.length).map(esc);
  const alt=sorted.concat(["[\\wåäöÅÄÖ]+"]).join("|");
  let re; try{ re=new RegExp("@("+alt+")","g"); }catch(e){ return text; }
  const out=[]; let last=0,m,k=0;
  while((m=re.exec(text))){ if(m.index>last) out.push(text.slice(last,m.index)); out.push(<span className="mention" key={"m"+(k++)}>@{m[1]}</span>); last=m.index+m[0].length; }
  if(last<text.length) out.push(text.slice(last));
  return out;
}
