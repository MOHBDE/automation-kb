function ActivityChart({entries}){
  const days=30;
  const today=new Date(); today.setHours(23,59,59,999);
  const buckets=new Array(days).fill(0);
  entries.forEach(e=>{
    if(!e.updated_at) return;
    const d=new Date(e.updated_at);
    if(isNaN(d)) return;
    const diff=Math.floor((today-d)/86400000);
    if(diff>=0 && diff<days) buckets[days-1-diff]++;
  });
  const max=Math.max(1,...buckets);
  const total=buckets.reduce((a,b)=>a+b,0);
  return (
    <div className="panel">
      <div className="panel-h">{Ico.chart} Aktivitet senaste 30 dagarna<span className="actcnt">{total} ändringar</span></div>
      <div className="actchart">
        {buckets.map((v,i)=><div key={i} className="actbar" title={v+" ändringar"}><div className="actbar-fill" style={{height:Math.max(3,Math.round(v/max*100))+"%",opacity:v?1:.22}}></div></div>)}
      </div>
      <div className="actaxis"><span>30 dgr sedan</span><span>idag</span></div>
    </div>
  );
}

function WhatsNew({entries, uid, onOpen}){
  const seenKey="scada-feed-seen-"+(uid||"x");
  const [lastSeen]=useState(function(){ try{ return localStorage.getItem(seenKey)||""; }catch(e){ return ""; } });
  const feed=entries.slice().sort((a,b)=>(b.updated_at||"").localeCompare(a.updated_at||"")).slice(0,10);
  useEffect(()=>{ const newest=feed.length?(feed[0].updated_at||""):""; if(newest){ try{ localStorage.setItem(seenKey,newest); }catch(e){} } },[]);
  if(feed.length===0) return null;
  function kindLabel(e){ const c=e.created_at||"", u=e.updated_at||""; if(!c) return "Uppdaterad"; return Math.abs(new Date(u)-new Date(c))<90000?"Ny":"Uppdaterad"; }
  return (
    <div className="panel">
      <div className="panel-h">{Ico.spark} Vad är nytt</div>
      <div className="feed">
        {feed.map(e=>{
          const isNew=lastSeen && (e.updated_at||"")>lastSeen;
          const mine=e.user_id===uid;
          const who=mine?"du":(e.author||"en kollega");
          const col=e.is_code?"#a78bfa":(e.checklist&&e.checklist.length)?"#34d399":"#60a5fa";
          const ic=e.is_code?Ico.terminal:(e.checklist&&e.checklist.length)?Ico.checklist:Ico.note;
          return <button key={e.id} className="feed-row" onClick={()=>onOpen(e)}>
            <span className="feed-ic" style={{color:col}}>{ic}</span>
            <span className="feed-main">
              <span className="feed-title">{e.title}{isNew?<span className="feed-new">Ny</span>:null}</span>
              <span className="feed-meta">{kindLabel(e)} · {who} · {fmtDateTime(e.updated_at)}{e.station?" · "+e.station:""}</span>
            </span>
          </button>;
        })}
      </div>
    </div>
  );
}

function rtConnect({ topic, token, onInsert, onBroadcast, onJoin }){
  const url = SUPABASE_URL.replace(/^http/,"ws") + "/realtime/v1/websocket?apikey=" + encodeURIComponent(SUPABASE_KEY) + "&vsn=1.0.0";
  let ws=null, hb=null, refN=1, joined=false, closed=false, reconnTimer=null;
  function nextRef(){ return String(refN++); }
  function rawSend(obj){ try{ if(ws&&ws.readyState===1) ws.send(JSON.stringify(obj)); }catch(e){} }
  function push(event,payload){ rawSend({ topic, event, payload, ref: nextRef() }); }
  function open(){
    if(closed) return;
    try{ ws=new WebSocket(url); }catch(e){ reconnTimer=setTimeout(open,3000); return; }
    ws.onopen=function(){
      joined=false;
      push("phx_join",{ config:{ broadcast:{ self:false, ack:false }, postgres_changes:[{ event:"INSERT", schema:"public", table:"messages" }] }, access_token: token });
      clearInterval(hb); hb=setInterval(function(){ rawSend({ topic:"phoenix", event:"heartbeat", payload:{}, ref: nextRef() }); }, 25000);
    };
    ws.onmessage=function(ev){
      let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
      if(m.event==="phx_reply" && !joined && m.payload && m.payload.status==="ok"){ joined=true; if(onJoin){ try{ onJoin(); }catch(e){} } return; }
      if(m.event==="postgres_changes"){ const d=m.payload&&m.payload.data; const rec=d&&(d.record||d.new); if(rec&&onInsert) onInsert(rec); return; }
      if(m.event==="broadcast"){ const p=m.payload||{}; if(onBroadcast) onBroadcast(p.event, p.payload); return; }
    };
    ws.onclose=function(){ clearInterval(hb); joined=false; if(!closed){ clearTimeout(reconnTimer); reconnTimer=setTimeout(open,2500); } };
    ws.onerror=function(){ try{ ws.close(); }catch(e){} };
  }
  open();
  return {
    isJoined:function(){ return joined; },
    close:function(){ closed=true; clearInterval(hb); clearTimeout(reconnTimer); try{ ws&&ws.close(); }catch(e){} },
    bcast:function(event,payload){ if(joined) push("broadcast",{ type:"broadcast", event:event, payload:payload }); },
    sendTyping:function(meta){ if(joined) push("broadcast",{ type:"broadcast", event:"typing", payload: meta }); }
  };
}

  const [orgId,setOrgId]=useState(null);
  const convRef=useRef(conv); useEffect(()=>{ convRef.current=conv; },[conv]);
  const rtRef=useRef(null); const typingTimer=useRef(null); const lastTyping=useRef(0); const seenRef=useRef({});

  useEffect(()=>{ listMembers(token).then(ms=>setMembers((ms||[]).filter(m=>m.id!==uid))); },[]);
  useEffect(()=>{
    let stop=false;
    async function load(){ try{ const ov=await fetchChatOverview(token, uid); if(!stop) setOverview(ov); }catch(e){} }
    load(); const iv=setInterval(load, 9000);
    return ()=>{ stop=true; clearInterval(iv); };
  },[token, uid]);
  useEffect(()=>{
    let stop=false; setLoading(true);
    async function tick(){ try{ const m=await fetchMessages(token, uid, conv); if(!stop){ setMsgs(m); if(onSeen) onSeen(conv); } }catch(e){} if(!stop) setLoading(false); }
    tick(); const iv=setInterval(tick, 4000);
    return ()=>{ stop=true; clearInterval(iv); };
  },[conv, token, uid]);
  useEffect(()=>{ if(openConv&&openConv.id){ setConv(openConv.id); setMobileThread(true); if(openConv.id!=="team") rememberConv(openConv.id); } },[openConv]);
  useEffect(()=>{ if(endRef.current) endRef.current.scrollIntoView(); },[msgs.length, mobileThread, conv]);
  useEffect(()=>{ let stop=false; (async()=>{
    try{ const r=await fetch(SUPABASE_URL+"/rest/v1/profiles?id=eq."+encodeURIComponent(uid)+"&select=org_id", { headers:{ apikey:SUPABASE_KEY, Authorization:"Bearer "+token } }); const j=await r.json(); if(!stop && j&&j[0]) setOrgId(j[0].org_id||null); }catch(e){}
  })(); return ()=>{ stop=true; }; },[token, uid]);
  useEffect(()=>{
    if(!token||!uid) return;
    const topic="realtime:chat-"+(orgId||("solo-"+uid));
    const me={ from:uid, name:(name||user||"") };
    function recompute(){ const now=Date.now(); const s=new Set(); Object.keys(seenRef.current).forEach(k=>{ if(now-seenRef.current[k]<30000) s.add(k); else delete seenRef.current[k]; }); setOnline(s); }
    const rt=rtConnect({
      topic, token,
      onJoin:()=>{ try{ rt.bcast("hello", me); rt.bcast("alive", me); }catch(e){} },
      onInsert:(rec)=>{
        const ck=rec.recipient_id==null ? "team" : (rec.sender_id===uid ? rec.recipient_id : rec.sender_id);
        setOverview(o=>({ ...o, [ck]:{ body:(rec.body||attachPreview(rec)), at:rec.created_at||new Date().toISOString(), fromMe:rec.sender_id===uid } }));
        if(ck===convRef.current){
          setMsgs(x=> x.some(z=>z.id===rec.id) ? x : [...x, rec]);
          if(rec.sender_id!==uid && onSeen) onSeen(ck);
        }
      },
      onBroadcast:(ev,p)=>{
        if(!p) return;
        if(ev==="typing"){ if(p.from===uid) return; const ck=(p.to==null)?"team":(p.to===uid?p.from:null); if(ck===null||ck!==convRef.current) return; setTyping({conv:ck,name:p.name||"Någon"}); clearTimeout(typingTimer.current); typingTimer.current=setTimeout(()=>setTyping(null),3500); return; }
        if(ev==="hello"){ if(p.from&&p.from!==uid){ seenRef.current[p.from]=Date.now(); recompute(); } try{ rt.bcast("alive", me); }catch(e){} return; }
        if(ev==="alive"){ if(p.from&&p.from!==uid){ seenRef.current[p.from]=Date.now(); recompute(); } return; }
        if(ev==="bye"){ if(p.from){ delete seenRef.current[p.from]; recompute(); } return; }
      }
    });
    rtRef.current=rt;
    const aliveIv=setInterval(()=>{ try{ rt.bcast("alive", me); }catch(e){} }, 12000);
    const pruneIv=setInterval(recompute, 5000);
    return ()=>{ try{ rt.bcast("bye",{from:uid}); }catch(e){} try{ rt.close(); }catch(e){} rtRef.current=null; clearInterval(aliveIv); clearInterval(pruneIv); clearTimeout(typingTimer.current); setTyping(null); seenRef.current={}; setOnline(new Set()); };
  },[token, uid, orgId]);

  function memberLabel(m){ return ((m&&m.name&&m.name.trim()) || ((m&&m.email)||"").split("@")[0]) || "medlem"; }
  function memberById(id){ return members.find(x=>x.id===id); }
  function labelFor(id){ if(id==="team") return "Teamet"; const m=memberById(id); return m?memberLabel(m):"medlem"; }
  function initials(id){ const s=labelFor(id); return (s||"?").slice(0,2).toUpperCase(); }
  function avStyle(id){ const s=labelFor(id); let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; const hh=h%360; return {background:"hsla("+hh+",60%,50%,.18)",color:"hsl("+hh+",60%,60%)"}; }
  function nameForSender(m){ const mem=memberById(m.sender_id); return (mem&&memberLabel(mem)) || m.sender_name || "medlem"; }
  function fmtDay(iso){ if(!iso) return ""; const d=new Date(iso); const t=new Date(); const y=new Date(); y.setDate(t.getDate()-1); const ds=d.toDateString(); if(ds===t.toDateString()) return "Idag"; if(ds===y.toDateString()) return "Igår"; return d.toLocaleDateString("sv-SE",{day:"numeric",month:"long"}); }
  function fmtConvTime(iso){ if(!iso) return ""; const d=new Date(iso); const t=new Date(); const y=new Date(); y.setDate(t.getDate()-1); const ds=d.toDateString(); if(ds===t.toDateString()) return fmtTime(iso); if(ds===y.toDateString()) return "Igår"; try{ return d.toLocaleDateString("sv-SE",{day:"numeric",month:"numeric"}); }catch(e){ return ""; } }

  function openConv(id){ setConv(id); setSearch(""); setMobileThread(true); rememberConv(id); }

  const convList=(function(){
    const ids=[];
    Object.keys(overview).forEach(k=>{ if(k!=="team" && ids.indexOf(k)<0) ids.push(k); });
    convHist.forEach(id=>{ if(ids.indexOf(id)<0) ids.push(id); });
    Object.keys(unreadMap||{}).forEach(k=>{ if(k!=="team" && ids.indexOf(k)<0) ids.push(k); });
    ids.sort((a,b)=>{ const ta=overview[a]?overview[a].at:""; const tb=overview[b]?overview[b].at:""; return (tb||"").localeCompare(ta||""); });
    return ids;
  })();
  const searchResults=(function(){
    const q=search.trim().toLowerCase(); if(!q) return [];
    return members.filter(m=>memberLabel(m).toLowerCase().indexOf(q)>=0 || ((m.email||"").toLowerCase().indexOf(q)>=0));
  })();

  async function send(){
    const b=text.trim();
    if(editingMsg){
      if(!b||sending) return;
      setSending(true);
      try{ await editMessageRow(token, editingMsg.id, b); setMsgs(x=>x.map(z=>z.id===editingMsg.id?{...z, body:b, edited_at:new Date().toISOString()}:z)); setEditingMsg(null); setText(""); }
      catch(e){ alert(e.message); }
      setSending(false); return;
    }
    if((!b&&!attaching)||sending) return;
    setSending(true);
    const row={ sender_id:uid, sender_name:(name||display||user), recipient_id: conv==="team"?null:conv, body:b };
    if(replyTo) row.attachments=[{type:"reply", name:replyTo.name, snippet:replyTo.snippet}];
    try{ const m=await sendMessageRow(token,row); setMsgs(x=>[...x,m]); setText(""); setReplyTo(null); rememberConv(conv); setOverview(o=>({...o,[conv]:{body:b,at:(m&&m.created_at)||new Date().toISOString(),fromMe:true}})); }
    catch(e){ alert(e.message); }
    setSending(false);
  }
  function startEdit(m){ setReplyTo(null); setEditingMsg({id:m.id, body:m.body||""}); setText(m.body||""); }
  function cancelEdit(){ setEditingMsg(null); setText(""); }
  async function deleteMsg(m){
    if(!window.confirm("Radera meddelandet?")) return;
    try{ await deleteMessageRow(token, m.id); setMsgs(x=>x.filter(z=>z.id!==m.id)); }
    catch(e){ alert(e.message); }
  }
  async function sendAttachment(att, bodyText){
    const row={ sender_id:uid, sender_name:(name||display||user), recipient_id: conv==="team"?null:conv, body:bodyText||"", attachments:[att] };
    const m=await sendMessageRow(token,row); setMsgs(x=>[...x,m]); rememberConv(conv);
    setOverview(o=>({...o,[conv]:{body:attachPreview(m),at:(m&&m.created_at)||new Date().toISOString(),fromMe:true}}));
  }
  async function onPickFile(e, asImage){
    const file=e.target.files&&e.target.files[0]; e.target.value="";
    if(!file) return;
    if(file.size>15*1048576){ alert("Filen är för stor (max 15 MB)."); return; }
    setAttaching(true); setAttachMenu(false);
    try{
      const url=await uploadChatFile(token,file);
      const isImg=asImage||(file.type||"").indexOf("image/")===0;
      await sendAttachment(isImg
        ? {type:"image", url, name:file.name, mime:file.type}
        : {type:"file", url, name:file.name, mime:file.type, size:file.size});
    }catch(err){ alert(err.message||"Kunde inte ladda upp"); }
    setAttaching(false);
  }
  function shareLocation(){
    setAttachMenu(false);
    if(!navigator.geolocation){ alert("Plats stöds inte här."); return; }
    setAttaching(true);
    navigator.geolocation.getCurrentPosition(async(pos)=>{
      try{ await sendAttachment({type:"location", lat:+pos.coords.latitude.toFixed(6), lng:+pos.coords.longitude.toFixed(6)}); }
      catch(err){ alert(err.message||"Kunde inte dela plats"); }
      setAttaching(false);
    },(err)=>{ alert("Kunde inte hämta plats: "+err.message); setAttaching(false); },{enableHighAccuracy:true,timeout:10000});
  }

  const [pushBusy,setPushBusy]=useState(false);
  const [pushOn,setPushOn]=useState(typeof Notification!=="undefined" && Notification.permission==="granted");
  const [pushMsg,setPushMsg]=useState("");
  async function enableNotif(){
    setPushBusy(true); setPushMsg("");
    try{ await enablePush(token, uid); setPushOn(true); setPushMsg("Aviseringar på"); alert("✓ Aviseringar på – prenumerationen sparad!"); }
    catch(e){ setPushMsg(e.message||"Kunde inte aktivera"); alert("⚠️ "+(e.message||"Kunde inte aktivera")); }
    setPushBusy(false);
  }

  function ConvRow({id, sub}){
    const ov=overview[id]; const unread=conv!==id && (unreadMap[id]||0)>0; const n=unreadMap[id]||0;
    const prev = ov ? ((ov.fromMe?"Du: ":"")+ov.body) : (sub||"");
    return (
      <button className={"conv"+(conv===id?" active":"")+(unread?" unread":"")} onClick={()=>openConv(id)}>
        <span className="conv-av" style={id==="team"?{}:avStyle(id)}>{id==="team"?Ico.users:initials(id)}{id!=="team"&&online.has(id)&&<i className="onl-dot"></i>}</span>
        <span className="conv-main">
          <span className="conv-name">{labelFor(id)}</span>
          <span className="conv-prev">{prev}</span>
        </span>
        <span className="conv-meta">
          {ov&&ov.at?<span className="conv-time">{fmtConvTime(ov.at)}</span>:<span className="conv-time"></span>}
          {unread?<span className="conv-badge">{n>9?"9+":n}</span>:null}
        </span>
      </button>
    );
  }

  return (
    <div className={"chat2"+(mobileThread?" show-thread":"")}>
      <div className="chat2-list">
        <div className="chat2-listhead">
          <h2 className="chat2-h">Chatt</h2>
          {pushSupported() && <button className={"chat-notif"+(pushOn?" on":"")} onClick={enableNotif} disabled={pushBusy} title={pushOn?"Aviseringar på – tryck för att registrera om":"Slå på aviseringar"}>{Ico.bell}<span className="chat-notif-lbl">{pushBusy?"…":(pushOn?"På":"Avi.")}</span></button>}
        </div>
        <div className="chat-search">{Ico.search}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Sök kollega…" />
          {search && <button className="chat-search-x" onClick={()=>setSearch("")}>{Ico.x}</button>}
        </div>
        {pushMsg && <div className="notifmsg" style={{margin:"0 14px 8px"}}>{pushMsg}</div>}
        <div className="convs">
          {search ? (
            searchResults.length===0 ? <div className="chat-hint">Hittar ingen som matchar "{search}".</div>
            : searchResults.map(m=><ConvRow key={m.id} id={m.id} sub={m.email||""} />)
          ) : (<>
            <ConvRow id="team" sub="Gemensam kanal för alla" />
            {convList.map(id=><ConvRow key={id} id={id} />)}
            {(function(){
              const shown=members.filter(m=>convList.indexOf(m.id)<0);
              if(shown.length===0) return null;
              return <React.Fragment>
                <div className="convs-sec">Teammedlemmar</div>
                {shown.map(m=><ConvRow key={m.id} id={m.id} sub={m.email||""} />)}
              </React.Fragment>;
            })()}
            {convList.length===0 && members.length===0 && <div className="chat-hint">Inga andra medlemmar än. Bjud in kollegor via Konto → "Skapa inbjudningskod".</div>}
          </>)}
        </div>
      </div>
      <div className="chat2-thread">
        <div className="chat2-thhead">
          <button className="chat-back" onClick={()=>setMobileThread(false)} title="Tillbaka">{Ico.chevL}</button>
          <span className="conv-av" style={conv==="team"?{}:avStyle(conv)}>{conv==="team"?Ico.users:initials(conv)}{conv!=="team"&&online.has(conv)&&<i className="onl-dot"></i>}</span>
          <div className="chat2-thtitle">
            <span className="conv-name">{labelFor(conv)}</span>
            <span className={"conv-prev"+(typing&&typing.conv===conv?" typing":"")}>{
              typing&&typing.conv===conv ? (typing.name+" skriver…")
              : conv==="team" ? ((members.length+1)+" medlemmar")
              : (online.has(conv) ? "online" : ((memberById(conv)&&memberById(conv).email)||"Privat konversation"))
            }</span>
          </div>
        </div>
        <div className="chat-msgs">
          {loading && msgs.length===0 ? <div className="chat-empty">Laddar meddelanden…</div>
           : msgs.length===0 ? <div className="chat-empty">{conv==="team"?"Inga meddelanden i teamet än. Skriv det första.":"Inga meddelanden än. Säg hej till "+labelFor(conv)+"."}</div>
           : (function(){
               const out=[]; let lastDay=null, lastSender=null;
               msgs.forEach(m=>{
                 const day=(m.created_at||"").slice(0,10);
                 let newDay=false;
                 if(day!==lastDay){ out.push(<div key={"d"+m.id} className="chat-day"><span>{fmtDay(m.created_at)}</span></div>); lastDay=day; lastSender=null; newDay=true; }
                 const mine=m.sender_id===uid;
                 const grouped=!newDay && m.sender_id===lastSender;
                 const showName=!mine && conv==="team" && !grouped;
                 lastSender=m.sender_id;
                 out.push(
                   <div key={m.id} className={"bubble-row"+(mine?" me":"")+(grouped?" grp":"")}>
                     <div className={"bubble"+(mine?" me":"")}>
                       {showName && <div className="bubble-name">{nameForSender(m)}</div>}
                       {(m.attachments||[]).map((a,ai)=>{
                         if(a.type==="reply") return <div key={ai} className="att-reply"><b>{a.name}</b><span>{a.snippet}</span></div>;
                         if(a.type==="ref") return <button key={ai} className="att-ref" onClick={()=>onOpenRef&&onOpenRef(a.kind,a.id)}>{a.kind==="alarm"?Ico.bell:a.kind==="station"?Ico.pin:Ico.note}<span><b>{a.title||"Post"}</b><small>{a.kind==="alarm"?"Larmkod":a.kind==="station"?"Station":"Kunskapspost"}</small></span></button>;
                         if(a.type==="image") return <a key={ai} href={a.url} target="_blank" rel="noopener" className="att-img"><img src={a.url} alt={a.name||"bild"} loading="lazy" /></a>;
                         if(a.type==="location") return <a key={ai} href={"https://www.google.com/maps?q="+a.lat+","+a.lng} target="_blank" rel="noopener" className="att-loc">{Ico.pin}<span><b>Delad plats</b><small>{a.lat}, {a.lng}</small></span></a>;
                         return <a key={ai} href={a.url} target="_blank" rel="noopener" download={a.name} className="att-file">{Ico.file2||Ico.report}<span><b>{a.name||"Fil"}</b><small>{fmtBytes(a.size)}</small></span></a>;
                       })}
                       {m.body && <div className="bubble-body">{renderMentions(m.body, mentionNames)}</div>}
                       <div className="bubble-time">{fmtTime(m.created_at)}{m.edited_at && <span className="edited"> · ändrad</span>}</div>
                     </div>
                     <div className="msg-actions">
                       <button className="msg-act" title="Svara" onClick={()=>{ setEditingMsg(null); setReplyTo({mid:m.id, name:nameForSender(m), snippet:((m.body||attachPreview(m)||"").slice(0,90))}); }}>{Ico.undo}</button>
                       {mine && m.body && <button className="msg-act" title="Redigera" onClick={()=>startEdit(m)}>{Ico.edit}</button>}
                       {mine && <button className="msg-act danger" title="Radera" onClick={()=>deleteMsg(m)}>{Ico.trash}</button>}
                     </div>
                   </div>
                 );
               });
               return out;
             })()}
          {typing&&typing.conv===conv && <div className="bubble-row"><div className="bubble typing-bubble"><span className="tdot"></span><span className="tdot"></span><span className="tdot"></span></div></div>}
          <div ref={endRef}></div>
        </div>
        {editingMsg ? <div className="reply-bar">
          <div className="reply-q"><b>{Ico.edit} Redigerar meddelande</b><span>Ändra texten och tryck skicka</span></div>
          <button className="reply-x" onClick={cancelEdit} title="Avbryt">{Ico.x}</button>
        </div> : replyTo && <div className="reply-bar">
          <div className="reply-q"><b>Svar till {replyTo.name}</b><span>{replyTo.snippet}</span></div>
          <button className="reply-x" onClick={()=>setReplyTo(null)} title="Avbryt">{Ico.x}</button>
        </div>}
        <div className="chat-input">
          <input ref={imgInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>onPickFile(e,true)} />
          <input ref={fileInputRef} type="file" style={{display:"none"}} onChange={e=>onPickFile(e,false)} />
          <div className="att-wrap">
            <button className="chat-attach" disabled={attaching} onClick={()=>setAttachMenu(v=>!v)} title="Bifoga">{attaching?"…":Ico.plus}</button>
            {attachMenu && <div className="att-menu">
              <button onClick={()=>{ setAttachMenu(false); imgInputRef.current&&imgInputRef.current.click(); }}>{Ico.image||Ico.box} Bild</button>
              <button onClick={()=>{ setAttachMenu(false); fileInputRef.current&&fileInputRef.current.click(); }}>{Ico.file2||Ico.report} Fil</button>
              <button onClick={shareLocation}>{Ico.pin} Plats</button>
            </div>}
          </div>
          <textarea value={text} onChange={e=>onComposeChange(e.target.value)} rows={1} placeholder={attaching?"Laddar upp…":("Skriv till "+labelFor(conv)+"…")}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); } }} />
          {mention!==null && mentionHits.length>0 && <div className="mention-menu">
            {mentionHits.map(x=><button key={x.id} onClick={()=>pickMention(x.name||x.email||"")}>{Ico.users}<span>{x.name||x.email}</span></button>)}
          </div>}
          <button className="chat-send" disabled={sending||!text.trim()} onClick={send} title="Skicka">{Ico.send}</button>
        </div>
      </div>
    </div>
  );
}

function Checklist({entry, interactive=true}){
  const items=entry.checklist||[];
  const key="scada-check-"+entry.id;
  const [done,setDone]=useState(function(){ try{ return JSON.parse(localStorage.getItem(key)||"[]"); }catch(e){ return []; } });
  function persist(n){ try{ localStorage.setItem(key, JSON.stringify(n)); }catch(e){} }
  function toggle(i){ setDone(d=>{ const n=d.indexOf(i)>=0?d.filter(x=>x!==i):[...d,i]; persist(n); return n; }); }
  function reset(){ setDone([]); try{ localStorage.removeItem(key); }catch(e){} }
  const count=done.filter(i=>i<items.length).length;
  const allDone=count===items.length && items.length>0;
  return (
    <div className="checklist">
      <div className="cl-head">
        <span className={"cl-prog"+(allDone?" done":"")}>{allDone?<>{Ico.check} Klar</>:count+"/"+items.length+" klara"}</span>
        {count>0 && interactive && <button className="cl-reset" onClick={reset}>{Ico.undo} Nollställ</button>}
      </div>
      <div className="cl-items">
        {items.map((s,i)=>{
          const checked=done.indexOf(i)>=0;
          return <button key={i} className={"cl-item"+(checked?" done":"")+(interactive?"":" ro")} onClick={(e)=>{ e.stopPropagation(); if(interactive) toggle(i); }}>
            <span className="cl-box">{checked?Ico.check:null}</span>
            <span className="cl-text">{s}</span>
          </button>;
        })}
      </div>
    </div>
  );
}

function ShareModal({token, uid, title, onPick, onClose}){
  const [members,setMembers]=useState([]);
  const [q,setQ]=useState("");
  useEffect(()=>{ let stop=false; listMembers(token).then(ms=>{ if(!stop) setMembers((ms||[]).filter(m=>m.id!==uid)); }); return ()=>{ stop=true; }; },[]);
  function lbl(m){ return (m.name&&m.name.trim())||((m.email||"").split("@")[0])||"medlem"; }
  const shown=members.filter(m=>{ const s=(lbl(m)+" "+(m.email||"")).toLowerCase(); return s.indexOf(q.toLowerCase())>=0; });
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal share-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h2>Dela "{title}"</h2><button className="x" onClick={onClose}>{Ico.x}</button></div>
        <div className="modal-body">
          <button className="share-row" onClick={()=>onPick("team")}>
            <span className="conv-av">{Ico.users}</span>
            <span className="share-main"><b>Teamet</b><small>Alla i teamet ser den</small></span>
          </button>
          <div className="convs-sec">Privat till en kollega</div>
          <div className="chat-search" style={{margin:"0 0 8px"}}>{Ico.search}
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Sök kollega…" />
            {q && <button className="chat-search-x" onClick={()=>setQ("")}>{Ico.x}</button>}
          </div>
          {shown.length===0 ? <div className="chat-hint">{members.length===0?"Inga andra medlemmar än.":"Ingen matchar."}</div>
          : shown.map(m=><button key={m.id} className="share-row" onClick={()=>onPick(m.id)}>
              <span className="conv-av">{lbl(m).slice(0,2).toUpperCase()}</span>
              <span className="share-main"><b>{lbl(m)}</b><small>{m.email}</small></span>
            </button>)}
        </div>
      </div>
    </div>
  );
}
function QRModal({entry,onClose}){
  const ref=useRef(null);
  const url=postUrl(entry.id);
  useEffect(()=>{
    if(!ref.current) return;
    ref.current.innerHTML="";
    if(window.QRCode){ try{ new window.QRCode(ref.current,{text:url,width:220,height:220,colorDark:"#0b0f14",colorLight:"#ffffff",correctLevel:window.QRCode.CorrectLevel.M}); }catch(e){} }
    else { ref.current.textContent="QR-biblioteket kunde inte laddas (kräver internet första gången)."; }
  },[url]);
  function download(){
    const cv=ref.current&&ref.current.querySelector("canvas");
    const img=ref.current&&ref.current.querySelector("img");
    let data=cv?cv.toDataURL("image/png"):(img&&img.src);
    if(!data) return;
    const a=document.createElement("a"); a.href=data;

function fmtDate(iso){ if(!iso) return ""; try{ return new Date(iso).toLocaleDateString("sv-SE",{year:"numeric",month:"short",day:"numeric"}); }catch(e){ return ""; } }
function fmtDateTime(iso){ if(!iso) return ""; try{ return new Date(iso).toLocaleString("sv-SE",{dateStyle:"medium",timeStyle:"short"}); }catch(e){ return ""; } }
function fmtTime(iso){ if(!iso) return ""; try{ return new Date(iso).toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } }
function fmtSize(n){ if(n===undefined||n===null||isNaN(n)) return ""; if(n<1024) return n+" B"; if(n<1048576) return Math.round(n/1024)+" kB"; return (n/1048576).toFixed(1)+" MB"; }
function postUrl(id){ try{ return window.location.origin+window.location.pathname+"?post="+id; }catch(e){ return "?post="+id; } }

function entryBlocks(entry){

function entryKind(entry){
  if(entry.checklist && entry.checklist.length) return "checklist";
  if((entry.blocks && entry.blocks.length) || entry.is_code) return "code";

}
function CodeBlock({code,lang}){
  let html=null;
  try{
    if(window.hljs){
      if(lang && lang!=="auto" && window.hljs.getLanguage(lang)) html=window.hljs.highlight(code,{language:lang,ignoreIllegals:true}).value;
      else html=window.hljs.highlightAuto(code,["python","sql","json","javascript","bash","xml"]).value;
    }
  }catch(e){}
  const lineCount=(code||"").split("\n").length;
  const gutter=Array.from({length:lineCount},(_,i)=>i+1).join("\n");
  return (
    <pre className="code"><span className="gutter" aria-hidden="true">{gutter}</span>
      {html!=null
        ? <code className="hljs codebody" dangerouslySetInnerHTML={{__html:html}} />
        : <code className="codebody">{code}</code>}
    </pre>
  );
}

function AllStationsMap({points, onPick}){
  const ref=useRef(null);
  const pickRef=useRef(onPick); pickRef.current=onPick;
  useEffect(()=>{
    if(!window.L || !ref.current || !points.length) return;
    let map;
    try{
      map=window.L.map(ref.current,{zoomControl:true});
      window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
      const latlngs=[];
      points.forEach(p=>{
        const m=window.L.marker([p.lat,p.lng]).addTo(map).bindPopup(p.name);
        m.on("click",()=>{ if(pickRef.current) pickRef.current(p.name); });
        latlngs.push([p.lat,p.lng]);
      });
      if(latlngs.length===1) map.setView(latlngs[0],14);
      else map.fitBounds(window.L.latLngBounds(latlngs).pad(0.25));
    }catch(e){}
    const t=setTimeout(()=>{ try{ map&&map.invalidateSize(); }catch(e){} },150);
    return ()=>{ clearTimeout(t); try{ map&&map.remove(); }catch(e){} };
  },[points]);
  return <div ref={ref} className="stationmap allstationsmap"></div>;
}
function StationMap({station, coord, onSet}){
  const ref=useRef(null);
  const [editing,setEditing]=useState(!coord);
  const [manual,setManual]=useState("");
  const [busy,setBusy]=useState(false);
  useEffect(()=>{
    if(!coord || editing || !window.L || !ref.current) return;
    let map;
    try{
      map=window.L.map(ref.current,{zoomControl:true}).setView([coord.lat,coord.lng],15);
      window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
      window.L.marker([coord.lat,coord.lng]).addTo(map).bindPopup(station);
    }catch(e){}
    const t=setTimeout(()=>{ try{ map&&map.invalidateSize(); }catch(e){} },150);
    return ()=>{ clearTimeout(t); try{ map&&map.remove(); }catch(e){} };
  },[coord&&coord.lat, coord&&coord.lng, station, editing]);
  function useMyLocation(){
    if(!navigator.geolocation){ alert("Plats stöds inte i den här webbläsaren."); return; }
    setBusy(true);
    navigator.geolocation.getCurrentPosition(
      p=>{ setBusy(false); onSet(p.coords.latitude,p.coords.longitude); setEditing(false); },
      err=>{ setBusy(false); alert("Kunde inte hämta plats: "+err.message); },
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  }
  function saveManual(){

    if(m.length<2){ alert("Skriv koordinater som: 56.674, 12.857"); return; }
    onSet(m[0],m[1]); setManual(""); setEditing(false);
  }
  if(coord && !editing){
    const mapsUrl="https://maps.apple.com/?q="+encodeURIComponent(station)+"&ll="+coord.lat+","+coord.lng;
    return (
      <div className="panel stationmap-panel">

        </div>
      </div>
    );

  return (
    <div className="panel stationset">
      <div className="panel-h">{Ico.pin} Position för {station}</div>
      <p className="sys-hint" style={{margin:"0 0 12px"}}>Sätt en position så visas stationen på karta. Använd din nuvarande plats (om du står där), eller klistra in koordinater från en karttjänst.</p>

        <button className="foot-btn foot-save" onClick={useMyLocation} disabled={busy}>{Ico.pin} {busy?"Hämtar…":"Använd min plats"}</button>
      </div>
      <div className="stationset-row">
        <input className="stationset-input" value={manual} onChange={e=>setManual(e.target.value)} placeholder="t.ex. 56.674, 12.857" />
        <button className="foot-mini" onClick={saveManual} disabled={!manual.trim()}>Spara</button>
        {coord && <button className="foot-mini" onClick={()=>setEditing(false)}>Avbryt</button>}
      </div>
    </div>
  );
}

  }
  function removeFile(url){ setFiles(x=>x.filter(f=>f.url!==url)); }
  const valid=title.trim()&&(kind==="code"?blocks.some(b=>(b.code||"").trim()):kind==="checklist"?steps.some(s=>s.trim()):text.trim());
  async function addImages(e){
    const files=Array.prototype.slice.call(e.target.files||[]); e.target.value="";
    if(!files.length) return;
    setUpBusy(true); setUpErr("");
    try{ for(const f of files){ const url=await uploadImage(token, uid, f); setImages(im=>[...im, url]); } }
    catch(err){ setUpErr(err.message||"Kunde inte ladda upp"); }
    setUpBusy(false);
  }
  function removeImage(url){ setImages(im=>im.filter(u=>u!==url)); }
  function handleSave(){
    if(!valid)return;
    const base={id:initial.id,title:title.trim(),system,category,tags:tags.split(",").map(t=>t.trim()).filter(Boolean),shared,images,files,station:station.trim()};
    if(kind==="code"){
      const clean=blocks.filter(b=>(b.code||"").trim()).map(b=>({title:(b.title||"").trim(),code:b.code,lang:b.lang||"auto"}));
      onSave({...base,content:clean.map(b=>b.code).join("\n\n"),notes:desc,isCode:true,lang:(clean[0]&&clean[0].lang)||"auto",blocks:clean,checklist:[]});
    } else if(kind==="checklist"){
      const cl=steps.map(s=>s.trim()).filter(Boolean);
      onSave({...base,content:cl.join("\n"),notes:desc,isCode:false,lang:"auto",blocks:[],checklist:cl});
    } else {
      onSave({...base,content:text,notes:"",isCode:false,lang:"auto",blocks:[],checklist:[]});
    }
  }
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal modal-wide" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h2>{initial.id?"Redigera post":"Ny post"}</h2><button className="x" onClick={onClose}>{Ico.x}</button></div>
        <div className="modal-body">
          <label className="field"><span className="lbl">Titel</span>
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="t.ex. Läsa UDT-parameter med getConfiguration" /></label>
          <div className="row2">
            <label className="field"><span className="lbl">System</span>
              {!addingSys ? (
                <select value={systems.includes(system)?system:"__new__"} onChange={e=>{ const v=e.target.value; if(v==="__new__"){ setNewSys(""); setAddingSys(true); } else setSystem(v); }}>
                  {systems.map(s=><option key={s} value={s}>{s}</option>)}
                  {system && !systems.includes(system) && <option value={system}>{system}</option>}
                  <option value="__new__">➕ Nytt system…</option>
                </select>
              ) : (
                <div className="newsys-row">
                  <input autoFocus value={newSys} onChange={e=>setNewSys(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); confirmNewSys(); } }} placeholder="t.ex. WinCC, FactoryTalk…" />
                  <button type="button" className="newsys-btn ok" disabled={!newSys.trim()} onClick={confirmNewSys} title="Lägg till">{Ico.check}</button>
                  <button type="button" className="newsys-btn" onClick={()=>{ setAddingSys(false); setNewSys(""); }} title="Avbryt">{Ico.x}</button>
                </div>
              )}
            </label>
            <label className="field"><span className="lbl">Ämne</span>
              {!addingCat ? (
                <select value={categories.includes(category)?category:"__new__"} onChange={e=>{ const v=e.target.value; if(v==="__new__"){ setNewCat(""); setAddingCat(true); } else setCategory(v); }}>
                  {categories.map(c=><option key={c} value={c}>{c}</option>)}
                  {category && !categories.includes(category) && <option value={category}>{category}</option>}
                  <option value="__new__">➕ Nytt ämne…</option>
                </select>
              ) : (
                <div className="newsys-row">
                  <input autoFocus value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); confirmNewCat(); } }} placeholder="t.ex. Backup, Nätverk…" />
                  <button type="button" className="newsys-btn ok" disabled={!newCat.trim()} onClick={confirmNewCat} title="Lägg till">{Ico.check}</button>
                  <button type="button" className="newsys-btn" onClick={()=>{ setAddingCat(false); setNewCat(""); }} title="Avbryt">{Ico.x}</button>
                </div>
              )}
            </label>
          </div>
          <div className="row2">
            <label className="field"><span className="lbl">Taggar (komma)</span>
              <input value={tags} onChange={e=>setTags(e.target.value)} placeholder="udt, perspective" /></label>
            <label className="field"><span className="lbl">{Ico.pin} Station / anläggning <span className="lbl-opt">valfritt</span></span>
              <input value={station} onChange={e=>setStation(e.target.value)} placeholder="t.ex. Pumpstation 1" list="station-suggest" />
              <datalist id="station-suggest">
                {STATION_EXAMPLES.concat(stations.filter(s=>STATION_EXAMPLES.indexOf(s)<0)).map(s=><option key={s} value={s} />)}
              </datalist></label>
          </div>
          <div className="toggle-row share-toggle">
            <button className={"toggle"+(!shared?" active":"")} onClick={()=>setShared(false)}>{Ico.lock} Privat</button>
            <button className={"toggle"+(shared?" active":"")} onClick={()=>setShared(true)}>{Ico.users} Delad med teamet</button>
          </div>
          <div className="share-hint">{shared?"Alla godkända i teamet kan se den här posten (bara du kan ändra den).":"Bara du ser den här posten."}</div>
          <div className="toggle-row">
            <button className={"toggle"+(kind==="code"?" active":"")} onClick={()=>setKind("code")}>{Ico.code} Kod</button>
            <button className={"toggle"+(kind==="note"?" active":"")} onClick={()=>setKind("note")}>{Ico.note} Anteckning</button>
            <button className={"toggle"+(kind==="checklist"?" active":"")} onClick={()=>setKind("checklist")}>{Ico.checklist} Checklista</button>
          </div>
          {isCode ? (
            <div className="blocks-edit">
              {blocks.map((b,i)=>(
                <div className="blockedit" key={i}>
                  <div className="blockedit-top">
                    <input className="block-title" value={b.title} onChange={e=>updateBlock(i,"title",e.target.value)} placeholder="Rubrik (valfritt) – t.ex. Tag-config" />
                    <label className="langpick"><span>Språk</span>
                      <select className="langsel" value={b.lang} onChange={e=>updateBlock(i,"lang",e.target.value)}>
                        <option value="auto">auto</option><option value="python">Python</option><option value="sql">SQL</option>
                        <option value="json">JSON</option><option value="javascript">JavaScript</option><option value="bash">Bash</option><option value="xml">XML/HTML</option>
                      </select>
                    </label>
                    {blocks.length>1 && <button className="block-del" title="Ta bort kodblock" onClick={()=>removeBlock(i)}>{Ico.x}</button>}
                  </div>
                  <textarea value={b.code} onChange={e=>updateBlock(i,"code",e.target.value)} rows={8} placeholder="Klistra in din kod här…" style={{fontFamily:"var(--mono)"}} />
                </div>
              ))}
              <button className="addblock" onClick={addBlock}>{Ico.add} Lägg till kodblock</button>
              <div className="tplhint">Tips: skriv <code>{"{{station}}"}</code> i koden för fält som kan fyllas i när posten används.</div>
              <label className="field"><span className="lbl">{Ico.note} Beskrivning / anteckning <span className="lbl-opt">valfritt</span></span>
                <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={4} placeholder="Beskriv vad koden gör, fallgropar, var den används…" style={{fontFamily:"var(--sans)"}} /></label>
            </div>
          ) : kind==="checklist" ? (
            <div className="steps-edit">
              {steps.map((s,i)=>(
                <div className="stepedit" key={i}>
                  <span className="step-num">{i+1}</span>
                  <input value={s} onChange={e=>updateStep(i,e.target.value)} placeholder={"Steg "+(i+1)+" – t.ex. Kvittera larm"} onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); addStep(); } }} />
                  {steps.length>1 && <button className="block-del" title="Ta bort steg" onClick={()=>removeStep(i)}>{Ico.x}</button>}
                </div>
              ))}
              <button className="addblock" onClick={addStep}>{Ico.add} Lägg till steg</button>
              <label className="field"><span className="lbl">{Ico.note} Beskrivning <span className="lbl-opt">valfritt</span></span>
                <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={3} placeholder="Kort kontext för rutinen…" style={{fontFamily:"var(--sans)"}} /></label>
            </div>
          ) : (
            <label className="field"><span className="lbl">{Ico.note} Text</span>
              <textarea value={text} onChange={e=>setText(e.target.value)} rows={8} placeholder="Skriv din anteckning här…" style={{fontFamily:"var(--sans)"}} /></label>
          )}
          <div className="imgsection">
            <div className="lbl" style={{marginBottom:8}}>{Ico.image} Bilder / skärmdumpar <span className="lbl-opt">valfritt</span></div>
            <div className="imggrid">
              {images.map(url=>(
                <div key={url} className="imgitem">
                  <img src={url} alt="" />
                  <button className="imgdel" onClick={()=>removeImage(url)} title="Ta bort">{Ico.x}</button>
                </div>
              ))}
              <button className="imgadd" onClick={()=>fileRef.current&&fileRef.current.click()} disabled={upBusy}>
                {upBusy?<span className="spin" style={{display:"inline-block"}}>{Ico.image}</span>:Ico.add}
                <span>{upBusy?"Laddar upp…":"Lägg till"}</span>
              </button>
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple onChange={addImages} style={{display:"none"}} />
            {upErr && <div style={{color:"#fca5a5",fontSize:12,marginTop:6}}>{upErr}</div>}
          </div>
          <div className="filesection">
            <div className="lbl" style={{marginBottom:8}}>{Ico.clip} Filer / bilagor <span className="lbl-opt">valfritt (PDF, CSV, manualer …)</span></div>
            {files.length>0 && <div className="filelist">
              {files.map(f=>(
                <div key={f.url} className="fileitem">
                  <span className="file-ic">{Ico.file}</span>
                  <span className="file-name" title={f.name}>{f.name}</span>
                  <span className="file-size">{fmtSize(f.size)}</span>
                  <button className="file-del" onClick={()=>removeFile(f.url)} title="Ta bort">{Ico.x}</button>
                </div>
              ))}
            </div>}
            <button className="addblock" onClick={()=>docRef.current&&docRef.current.click()} disabled={fUpBusy} style={{marginTop:files.length?8:0}}>
              {fUpBusy?<span className="spin" style={{display:"inline-block"}}>{Ico.clip}</span>:Ico.add}<span>{fUpBusy?"Laddar upp…":"Lägg till fil"}</span>
            </button>
            <input ref={docRef} type="file" multiple onChange={addFiles} style={{display:"none"}} />
            {fUpErr && <div style={{color:"#fca5a5",fontSize:12,marginTop:6}}>{fUpErr}</div>}
          </div>
        </div>
        <div className="modal-foot">
          <button className="foot-btn foot-cancel" onClick={onClose}>Avbryt</button>
          <button className="foot-btn foot-save" disabled={!valid||busy} onClick={handleSave}>{Ico.save} {busy?"Sparar…":"Spara"}</button>
        </div>
      </div>
    </div>
  );
}

function UserModal({token,user,name,uid,isAdmin,onName,backups=[],onDownloadBackup,onRestoreBackup,onClose}){
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState(null); const [need,setNeed]=useState(false);
  const [profiles,setProfiles]=useState(null); const [pBusy,setPBusy]=useState(false);
  const [inviteCode,setInviteCode]=useState(""); const [inviteBusy,setInviteBusy]=useState(false);
  async function makeInvite(){ setInviteBusy(true); try{ const c=await callRpc(token,"create_invite",{}); setInviteCode(typeof c==="string"?c:(c&&c[0])||""); }catch(e){ setInviteCode(""); alert(e.message||"Kunde inte skapa kod"); } setInviteBusy(false); }
  useEffect(()=>{ if(isAdmin) loadProfiles(); },[]);
  async function loadProfiles(){ setPBusy(true); try{ setProfiles(await listProfiles(token)); }catch(e){ setProfiles([]); } setPBusy(false); }
  async function setMember(id,fields){ try{ await callRpc(token,"admin_set_member",{target:id,new_approved:("new_approved" in fields?fields.new_approved:null),new_role:(fields.new_role||null)}); setProfiles(ps=>(ps||[]).map(p=>p.id===id?{...p,...("new_approved" in fields?{approved:fields.new_approved}:{}),...(fields.new_role?{role:fields.new_role}:{})}:p)); }catch(e){ alert(e.message||"Gick inte"); } }
  async function removeMember(id){ try{ await callRpc(token,"admin_remove_member",{target:id}); setProfiles(ps=>(ps||[]).filter(p=>p.id!==id)); }catch(e){ alert(e.message||"Gick inte"); } }
  async function create(){
    if(!email||!pw) return;
    setBusy(true); setMsg(null); setNeed(false);
    try{
      await createUserViaFunction(token,email.trim(),pw);
      setMsg({ok:true,text:"Användare skapad: "+email.trim()});
      setEmail(""); setPw("");
    }catch(e){
      if(e.message==="__NO_FUNCTION__"){ setNeed(true); }
      else setMsg({ok:false,text:e.message});
    }
    setBusy(false);
  }
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head"><h2>Konto &amp; användare</h2><button className="x" onClick={onClose}>{Ico.x}</button></div>
        <div className="modal-body">
          <div className="useryou">{Ico.users}<div><div style={{color:"var(--txt)",fontSize:13}}>{(name&&name.trim())||user}</div><div style={{color:"var(--dim)",fontSize:11}}>{user}</div></div></div>
          <div className="field" style={{marginTop:4}}><span className="lbl">Bjud in en kollega</span>
            {inviteCode
              ? <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input readOnly value={inviteCode} onFocus={e=>e.target.select()} style={{flex:1,minWidth:0,fontFamily:"var(--mono)",letterSpacing:".12em"}} />
                  <button className="foot-btn" style={{flex:"0 0 auto"}} onClick={()=>{try{navigator.clipboard.writeText(inviteCode);}catch(e){}}}>Kopiera</button>
                </div>
              : <button className="foot-btn foot-save" onClick={makeInvite} disabled={inviteBusy}>{inviteBusy?"…":"Skapa inbjudningskod"}</button>}
            <span className="lbl-opt" style={{display:"block",marginTop:6}}>Dela koden – kollegan väljer "Gå med via kod" vid registrering.</span>
          </div>
          {isAdmin ? (
            <>
              <div className="udivider">Medlemmar</div>
              {pBusy && <div style={{color:"var(--dim)",fontSize:12}}>Laddar…</div>}
              {profiles && profiles.length===0 && !pBusy && <div style={{color:"var(--dim)",fontSize:12}}>Inga medlemmar än.</div>}
              {profiles && profiles.map(p=>{
                const self=p.id===uid; const role=p.role||"member";
                return (
                <div key={p.id} className="urow">
                  <div style={{minWidth:0,flex:1}}>
                    <div className="urow-mail">{p.name||p.email||p.id}{role!=="member"&&<span className="utag admin">{role==="owner"?"ägare":"admin"}</span>}{self&&<span className="utag">du</span>}</div>
                    <div className={"urow-status "+(p.approved?"ok":"wait")}>{p.email||p.id} · {p.approved?"aktiv":"pausad"}</div>
                  </div>
                  {!self && role!=="owner" && (
                    <div className="urow-acts">
                      {p.approved
                        ? <button className="ubtn-revoke" onClick={()=>setMember(p.id,{new_approved:false})}>Pausa</button>
                        : <button className="ubtn-approve" onClick={()=>setMember(p.id,{new_approved:true})}>{Ico.check} Aktivera</button>}
                      {role==="admin"
                        ? <button className="ubtn-revoke" onClick={()=>setMember(p.id,{new_role:"member"})}>Ta bort admin</button>
                        : <button className="ubtn-approve" onClick={()=>setMember(p.id,{new_role:"admin"})}>Gör till admin</button>}
                      <button className="ubtn-revoke" title="Ta bort ur organisationen" onClick={()=>{ if(confirm("Ta bort "+(p.name||p.email||"medlemmen")+" ur organisationen?")) removeMember(p.id); }}>{Ico.trash}</button>
                    </div>
                  )}
                </div>
                );
              })}
              <p style={{color:"var(--dim)",fontSize:11,margin:0,lineHeight:1.5}}>Kollegor går med via inbjudningskod. Här kan du pausa, göra till admin eller ta bort medlemmar. Ägaren kan inte ändras.</p>
            </>
          ) : (
            <p style={{color:"var(--dim)",fontSize:12,margin:0,lineHeight:1.5}}>Dina poster är privata för din organisation. Bjud in kollegor med en inbjudningskod (knappen ovan) så hamnar de i samma organisation.</p>
          )}
          <div className="bk-section">
            <div className="bk-head">{Ico.db} Säkerhetskopior</div>
            <p className="sys-hint" style={{margin:"0 0 10px"}}>Appen sparar automatiskt en kopia av all data per dag (de 7 senaste) på den här enheten. Ladda ner en kopia eller återställ saknade poster.</p>
            {backups.length===0 ? (
              <p style={{fontSize:12.5,color:"var(--dim)",margin:0}}>Ingen kopia ännu – skapas nästa gång data laddas.</p>
            ) : (
              <div className="bk-list">
                {backups.map(b=>(
                  <div className="bk-item" key={b.date}>
                    <div className="bk-info"><span className="bk-date">{b.date}</span><span className="bk-count">{b.count} poster</span></div>
                    <button className="trash-btn" onClick={()=>onDownloadBackup&&onDownloadBackup(b)} title="Ladda ner JSON">{Ico.down} Ladda ner</button>
                    <button className="trash-btn restore" onClick={()=>onRestoreBackup&&onRestoreBackup(b)} title="Återställ saknade poster">{Ico.undo} Återställ</button>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div className="ver-row">
            <span>SCADA-KB · version {APP_VERSION}</span>
            <button className="ver-check" onClick={async()=>{ try{ const r=await navigator.serviceWorker.getRegistration(); if(r) await r.update(); alert("Sökte efter uppdatering. Finns en ny version visas en gul banner högst upp."); }catch(e){ alert("Kunde inte söka just nu."); } }}>Sök uppdatering</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
</script>
</body>
</html>
